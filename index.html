var ret=null;
function markReturned(id){
  var r=DB.rentals.find(function(x){return x.id===id;}); if(!r) return;
  if(r.billed){
    if(!confirm('Mark returned? Rent was already billed on '+(r.billNo||'the bill')+'.')) return;
    r.returned=true; r.returnedDate=nowISO(); saveDB(); closeSheet(); toast('Marked returned'); render(); return;
  }
  ret={ id:id, returnDate:nowISO(), discount:0, paid:0 };
  renderReturn();
}
function renderReturn(){
  var r=DB.rentals.find(function(x){return x.id===ret.id;}); if(!r){ closeSheet(); return; }
  var days=rentDays(r.dateOut,ret.returnDate);
  var perDay=rentPerDay(r.items);
  var gross=perDay*days;
  var net=Math.max(0,gross-(Number(ret.discount)||0));
  var h='<h2>Return & Bill<button class="x" onclick="closeSheet()">×</button></h2>';
  h+='<div class="card card-pad"><div style="font-weight:800">'+esc(r.cust.name)+'</div>'+
     '<div class="muted" style="font-size:12px">'+(r.no||'')+' · Out '+fmtDate(r.dateOut)+'</div></div>';
  h+='<label class="fld"><span class="lab">Return date</span><input class="inp" type="date" value="'+new Date(ret.returnDate).toISOString().slice(0,10)+'" onchange="ret.returnDate=this.value?new Date(this.value).toISOString():nowISO();renderReturn()"></label>';
  h+='<div class="section-eyebrow">Service charge ('+days+' day'+(days>1?'s':'')+') <span class="ln"></span></div><div class="card card-pad">';
  r.items.forEach(function(it){
    var amt=(Number(it.rate)||0)*(Number(it.qty)||1)*days;
    h+='<div class="tot"><span style="font-size:12px">'+esc(it.name)+' · '+it.qty+' '+esc(it.unit)+' × '+inr(it.rate)+'/day</span><span class="tabular">'+inr(amt)+'</span></div>';
  });
  h+='<div class="tot g" style="border-top:1px solid var(--line);margin-top:4px;padding-top:6px"><span>Gross ('+days+' × '+inr(perDay)+'/day)</span><span class="tabular">'+inr(gross)+'</span></div>';
  h+='</div>';
  h+='<label class="fld"><span class="lab">Discount (₹)</span><input class="inp" inputmode="decimal" value="'+(ret.discount||'')+'" placeholder="0" oninput="ret.discount=parseFloat(this.value)||0;retUpd()"></label>';
  h+='<div class="card card-pad"><div class="tot g"><span>Net rent payable</span><span class="tabular" id="ret_net" style="color:var(--ochre);font-weight:800">'+inr(net)+'</span></div>'+
     (r.deposit?'<div class="tot" style="margin-top:2px"><span>Deposit to refund</span><span class="tabular">'+inr(r.deposit)+'</span></div>':'')+'</div>';
  h+='<label class="fld"><span class="lab">Amount received now (₹)</span><input class="inp" id="ret_paid" inputmode="decimal" value="'+(ret.paid||'')+'" placeholder="0 = full credit" oninput="ret.paid=parseFloat(this.value)||0;retUpd()"></label>';
  h+='<div class="card card-pad"><div class="tot" style="font-weight:800;color:'+((net-(Number(ret.paid)||0))>0?'var(--due)':'var(--ok)')+'"><span>Balance due</span><span class="tabular" id="ret_bal">'+inr(Math.max(0,net-(Number(ret.paid)||0)))+'</span></div></div>';
  h+='<div class="spacer"></div>';
  h+='<button class="btn primary" onclick="confirmReturn(true)">✅ Return &amp; Make Invoice</button>';
  h+='<button class="btn ghost" style="margin-top:8px" onclick="confirmReturn(false)">Return without invoice</button>';
  openSheet(h);
}
function retUpd(){
  var r=DB.rentals.find(function(x){return x.id===ret.id;}); if(!r) return;
  var net=Math.max(0,rentPerDay(r.items)*rentDays(r.dateOut,ret.returnDate)-(Number(ret.discount)||0));
  var en=document.getElementById('ret_net'); if(en) en.textContent=inr(net);
  var eb=document.getElementById('ret_bal'); if(eb) eb.textContent=inr(Math.max(0,net-(Number(ret.paid)||0)));
}
function confirmReturn(makeInvoice){
  var r=DB.rentals.find(function(x){return x.id===ret.id;}); if(!r) return;
  var days=rentDays(r.dateOut,ret.returnDate);
  var gross=rentPerDay(r.items)*days;
  r.returned=true; r.returnedDate=ret.returnDate;
  r.days=days; r.discount=Number(ret.discount)||0;
  r.rentAmount=Math.max(0,gross-r.discount);
  r.paid=Math.min(r.rentAmount, Number(ret.paid)||0);
  logAct('Rental returned '+(r.no||'')+' · '+r.cust.name+' · rent '+inr(r.rentAmount)+' ('+days+' day'+(days>1?'s':'')+')');
  saveDB(); closeSheet();
  var bal=Math.max(0,r.rentAmount-r.paid);
  toast('Returned · rent '+inr(r.rentAmount)+(bal>0?' · due '+inr(bal):' · paid'));
  if(makeInvoice) rentalInvoiceShare(r.id); else render();
}
function remindRental(id){

function rentalText(r,lg){
  lg=lg||'en';
  var O=[]; var line='— — — — — — — — — — —';
  O.push('*'+DB.shop.name.toUpperCase()+'*');
  O.push(DB.shop.addr);
  if(DB.shop.gst) O.push(DB.shop.gst);
  O.push('📞 '+DB.shop.phone);
  O.push(line);
  O.push('*'+L(lg,'rentalInvoice')+'*  '+(r.no||''));
  O.push(L(lg,'date')+': '+fmtDate(r.dateOut)+'   '+L(lg,'time')+': '+fmtTime(r.dateOut));
  if(r.cust.name) O.push(L(lg,'to')+': '+r.cust.name);
  if(r.cust.addr) O.push(L(lg,'addr')+': '+r.cust.addr);
  if(r.cust.phone) O.push('📞 '+r.cust.phone);
  if(r.dueDate) O.push(L(lg,'dueDateLbl')+': '+fmtDate(r.dueDate));
  if(r.returned) O.push(L(lg,'returnDate')+': '+fmtDate(r.returnedDate));
  var days=rentalDaysFor(r);
  O.push(L(lg,'days')+': '+days);
  O.push(line);
  O.push('*'+L(lg,'sno')+'  '+L(lg,'item')+'  ('+L(lg,'qty')+' × '+L(lg,'rate')+')*');
  r.items.forEach(function(it,i){
    var d=itemDays(r,it); var amt=(Number(it.rate)||0)*(Number(it.qty)||1)*d;
    O.push((i+1)+'. '+it.name);
    O.push('    '+L(lg,'qty')+': '+it.qty+' '+it.unit+' × '+inr(it.rate)+L(lg,'perDay')+' × '+d+' = *'+inr(amt)+'*');
  });
  O.push(line);
  var gross=rentalGross(r);
  O.push(L(lg,'subtotal')+': '+inr(gross));
  if(r.discount) O.push(L(lg,'discount')+': −'+inr(r.discount));
  O.push('*'+L(lg,'rentTotal')+': '+inr(rentalNet(r))+'*');
  if(!r.billed){
    O.push(L(lg,'paid')+': '+inr(r.paid||0));
    O.push('*'+L(lg,'balance')+': '+inr(rentalBalance(r))+'*');
  }
  if(r.deposit) O.push(L(lg,'deposit')+': '+inr(r.deposit));
  if(r.notes){ O.push(line); O.push('📝 '+L(lg,'notes')+': '+r.notes); }
  O.push(line);
  O.push('_'+L(lg,'terms')+'_');
  termsFor(lg).forEach(function(t){ O.push('• '+t); });
  O.push(line);
  O.push(L(lg,'thanks')+' — '+DB.shop.name);
  return O.join('\n');
}

/* Rental PDF — English via jsPDF; Hindi/Urdu via html2canvas (both shareable to WhatsApp) */
function exportRentalPDF(r,lg){
  if(!r) return;
  lg=lg||(DB.settings&&DB.settings.billLang)||'en';
  if(lg!=='en'){ pdfFromDoc(rentalDocHTML(r,lg,isRTL(lg),false), (r.no||'rental')+'.pdf', {no:r.no||'Rental'}); return; }
  toast('Building PDF…');
  var days=rentalDaysFor(r); var perDay=rentPerDay(r.items); var gross=perDay*days;
  loadJsPDF().then(function(jsPDF){
    var doc=new jsPDF({unit:'pt',format:'a4'});
    var W=595, m=40, y=46;
    doc.setFont('helvetica','bold'); doc.setFontSize(20); doc.setTextColor(27,26,23);
    doc.text(DB.shop.name.toUpperCase(),m,y);
    doc.setDrawColor(212,121,27); doc.setLineWidth(3); doc.line(m,y+6,m+150,y+6);
    doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(90,90,90);
    doc.text(DB.shop.addr,m,y+22);
    var phY=y+34; if(DB.shop.gst){ doc.text(DB.shop.gst,m,phY); phY+=12; }
    doc.text('Phone: '+DB.shop.phone,m,phY);
    doc.setFont('helvetica','bold'); doc.setFontSize(13); doc.setTextColor(42,48,59);
    doc.text('RENTAL INVOICE', W-m, y, {align:'right'});
    doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(90,90,90);
    doc.text(r.no||'', W-m, y+16,{align:'right'});
    doc.text('Out: '+fmtDate(r.dateOut), W-m, y+28,{align:'right'});
    if(r.dueDate) doc.text('Due: '+fmtDate(r.dueDate), W-m, y+40,{align:'right'});
    if(r.returned) doc.text('Returned: '+fmtDate(r.returnedDate), W-m, y+52,{align:'right'});
    y=Math.max(phY,y+52)+18;
    doc.setTextColor(27,26,23); doc.setFont('helvetica','bold'); doc.setFontSize(10);
    doc.text('Bill To: '+(r.cust.name||'Customer'),m,y);
    doc.setFont('helvetica','normal');
    if(r.cust.phone){ y+=13; doc.text(r.cust.phone,m,y); }
    if(r.cust.addr){ y+=12; doc.setFontSize(9); doc.setTextColor(90,90,90); doc.text(doc.splitTextToSize('Addr: '+r.cust.addr,W-2*m),m,y); doc.setFontSize(10); doc.setTextColor(27,26,23); }
    y+=22;
    doc.setFillColor(42,48,59); doc.rect(m,y-12,W-2*m,20,'F');
    doc.setTextColor(255,255,255); doc.setFontSize(8.5); doc.setFont('helvetica','bold');
    doc.text('#',m+6,y+2); doc.text('ITEM',m+26,y+2); doc.text('QTY',W-260,y+2,{align:'right'});
    doc.text('RATE/DAY',W-170,y+2,{align:'right'}); doc.text('DAYS',W-110,y+2,{align:'right'}); doc.text('AMOUNT',W-m-6,y+2,{align:'right'});
    y+=20;
    doc.setTextColor(40,40,40); doc.setFont('helvetica','normal'); doc.setFontSize(9.5);
    r.items.forEach(function(it,idx){
      if(y>770){ doc.addPage(); y=50; }
      var d=itemDays(r,it); var amt=(Number(it.rate)||0)*(Number(it.qty)||1)*d;
      doc.text(String(idx+1),m+6,y);
      doc.text(String(it.name).slice(0,34),m+26,y);
      doc.text(it.qty+' '+it.unit,W-260,y,{align:'right'});
      doc.text(inrPlain(it.rate),W-170,y,{align:'right'});
      doc.text(String(d),W-110,y,{align:'right'});
      doc.text(inrPlain(amt),W-m-6,y,{align:'right'});
      doc.setDrawColor(235,235,235); doc.line(m,y+5,W-m,y+5);
      y+=18;
    });
    y+=10;
    function totRow(lbl,val,bold,col){
      doc.setFont('helvetica',bold?'bold':'normal'); doc.setFontSize(bold?11:9.5);
      if(col)doc.setTextColor(col[0],col[1],col[2]); else doc.setTextColor(40,40,40);
      doc.text(lbl,W-170,y,{align:'right'}); doc.text(val,W-m-6,y,{align:'right'}); y+=16;
    }
    totRow('Subtotal',inrPlain(gross));
    if(r.discount) totRow('Discount','-'+inrPlain(r.discount));
    y+=2; doc.setDrawColor(42,48,59); doc.setLineWidth(1.2); doc.line(W-200,y,W-m,y); y+=16;
    totRow('RENTAL TOTAL',inrPlain(rentalNet(r)),true);
    if(!r.billed){ totRow('Paid',inrPlain(r.paid||0)); totRow('Balance Due',inrPlain(rentalBalance(r)),true,rentalBalance(r)>0?[192,57,43]:[46,125,70]); }
    if(r.deposit) totRow('Deposit (refundable)',inrPlain(r.deposit));
    y+=14;
    if(r.notes){ doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(80,80,80); doc.text('NOTES',m,y); y+=12; doc.setFont('helvetica','normal');doc.setFontSize(8.5);doc.setTextColor(110,110,110); doc.text(doc.splitTextToSize(r.notes,W-2*m),m,y); y+=14+Math.max(0,(doc.splitTextToSize(r.notes,W-2*m).length-1)*10); }
    doc.setDrawColor(200,200,200); doc.setLineWidth(.5); doc.line(m,y,W-m,y); y+=14;
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(80,80,80);
    doc.text('TERMS & CONDITIONS',m,y); y+=12;
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(110,110,110);
    termsFor('en').forEach(function(t){ doc.text('•  '+t,m,y); y+=11; });
    var blob=doc.output('blob');
    sharePDF(blob,(r.no||'rental')+'.pdf',{no:r.no||'Rental'});
  }).catch(function(){ toast('PDF needs internet once. Opening print view…'); printRental(r,'en'); });
}
function viewExpenses(){
  var h=screenHeader('Expenses','Conveyance, transport, tea & more');
  var today=sum(expBetween(startOf('day'),null),function(e){return e.amount;});
  var month=sum(expBetween(startOf('month'),null),function(e){return e.amount;});
  h+='<div class="tiles"><div class="tile amber"><div class="lbl">Today</div><div class="val tabular">'+inr(today)+'</div></div>'+
     '<div class="tile"><div class="lbl">This Month</div><div class="val tabular">'+inr(month)+'</div></div></div>';
  h+='<button class="btn primary" style="margin:12px 0" onclick="openExpenseForm()">➕ Add Expense</button>';
  var list=(DB.expenses||[]).slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  if(!list.length) return h+'<div class="empty"><div class="big">🧾</div><p>No expenses logged.</p></div>';
  /* group by date */
  var groups={};
  list.forEach(function(e){ var k=fmtDate(e.date); (groups[k]=groups[k]||[]).push(e); });
  Object.keys(groups).forEach(function(k){
    var dayTot=sum(groups[k],function(e){return e.amount;});
    h+='<div class="section-eyebrow">'+k+' · '+inr(dayTot)+' <span class="ln"></span></div><div class="card">';
    groups[k].forEach(function(e){
      h+='<div class="list-item"><div class="li-main"><div class="t">'+esc(e.cat)+'</div>'+(e.note?'<div class="s"><span>'+esc(e.note)+'</span></div>':'')+'</div>'+
         '<div class="li-right"><div class="p tabular">'+inr(e.amount)+'</div>'+
         '<button class="btn ghost tiny" style="margin-top:4px;color:var(--due)" onclick="deleteExpense(\''+e.id+'\')">Delete</button></div></div>';
    });
    h+='</div>';
  });
  return h;
}

function saveExpense(){
  var amt=parseFloat(document.getElementById('e_amt').value)||0;

  var dv=document.getElementById('e_date').value;
  DB.expenses.unshift({ id:'e'+Date.now(), cat:document.getElementById('e_cat').value,
    amount:amt, date:dv?new Date(dv).toISOString():nowISO(), note:document.getElementById('e_note').value.trim() });
  saveDB(); closeSheet(); toast('Expense added'); render();
}
function deleteExpense(id){ if(!confirm('Delete this expense?'))return; DB.expenses=DB.expenses.filter(function(e){return e.id!==id;}); saveDB(); toast('Deleted'); render(); }

  h+='<div class="section-eyebrow">Low / Out of Stock ('+low.length+') <span class="ln"></span></div>';
  if(!low.length){ h+='<div class="card card-pad"><div class="muted" style="font-size:13px">All items are above their minimum level. 👍</div></div>'; }
  else{
    h+='<div class="card">';

      var out=(Number(it.stock)||0)<=0;
      h+='<div class="rate-row" onclick="openItemForm(\''+it.id+'\')"><div class="nm">'+esc(it.name)+' '+(out?'<span class="badge out">OUT</span>':'<span class="badge due">LOW</span>')+'<small>stock '+(it.stock||0)+' '+esc(it.unit||'')+' · min '+(it.min||0)+'</small></div><div class="price">›</div></div>';
    });
    h+='</div>';
    h+='<button class="btn steel sm" style="margin-top:8px;width:100%" onclick="openPurchaseForm()">🛒 New purchase (auto-fills these '+low.length+')</button>';
  }
  if(!purch.length) return h+'<div class="empty"><div class="big">🚚</div><p>No purchases logged.</p><p class="muted">Record stock you buy from suppliers here.</p></div>';
  /* supplier-wise payable */
  var bySup={};
  purch.forEach(function(p){ var k=(p.supplier||'—'); if(!bySup[k])bySup[k]={name:k,phone:p.phone||'',bal:0}; bySup[k].bal+=Number(p.balance)||0; if(p.phone)bySup[k].phone=p.phone; });
  var owing=Object.keys(bySup).map(function(k){return bySup[k];}).filter(function(s){return s.bal>0;}).sort(function(a,b){return b.bal-a.bal;});
  if(owing.length){
    h+='<div class="section-eyebrow">Payable by Supplier <span class="ln"></span></div><div class="card">';
    owing.forEach(function(s){
      h+='<div class="rate-row"><div class="nm">'+esc(s.name)+(s.phone?'<small>'+esc(s.phone)+'</small>':'')+'</div>'+
         '<div class="price"><span class="badge due">'+inr(s.bal)+'</span></div></div>';
    });
    h+='</div>';
  }
  h+='<div class="section-eyebrow">Purchase History <span class="ln"></span></div><div class="card">';
  purch.slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).forEach(function(p){
    var st=p.balance>0?'<span class="badge due">DUE '+inr(p.balance)+'</span>':'<span class="badge paid">PAID</span>';
    h+='<div class="list-item" onclick="openPurchaseView(\''+p.id+'\')"><div class="li-main"><div class="t">'+esc(p.supplier||'Supplier')+' '+st+'</div>'+
       '<div class="s"><span>'+p.no+'</span><span>'+fmtDate(p.date)+'</span>'+(p.desc?'<span>'+esc(p.desc).slice(0,24)+'</span>':'')+'</div></div>'+
       '<div class="li-right"><div class="p tabular">'+inr(p.amount)+'</div></div></div>';
  });
  h+='</div>';
  return h;
}
var purchase=null;

function purNewItem(){

function savePurchase(){
  if(!purchase.supplier.trim()){ toast('Enter supplier'); return; }
  if(!purchase.lines.length){ toast('Add at least one item'); return; }
  var total=purTotal(); var paid=Number(purchase.paid)||0;
  var no='AVT-PUR-'+String(DB.purSeq||1).padStart(4,'0'); DB.purSeq=(DB.purSeq||1)+1;
  purchase.lines.forEach(function(l){
    if(l.itemId){ var it=byId(l.itemId); if(it){
        var oldStock=Number(it.stock)||0, oldBuy=Number(it.buy)||0, addQty=Number(l.qty)||0, newRate=Number(l.rate)||0;
        var newStock=oldStock+addQty;
        if(newRate){ it.buy=(oldBuy>0 && newStock>0) ? Math.round(((oldStock*oldBuy)+(addQty*newRate))/newStock*100)/100 : newRate; }
        it.stock=newStock;
      } }
    else { var nid='it'+Date.now()+Math.floor(Math.random()*1000);
      DB.items.push({id:nid,name:l.name,cat:'Other',unit:l.unit||'pcs',buy:Number(l.rate)||0,sell:0,stock:Number(l.qty)||0,min:0,rentable:false,rentRate:0,photo:''});
      l.itemId=nid; }
  });
  var desc=purchase.lines.map(function(l){return l.qty+' '+(l.unit||'')+' '+l.name;}).join(', ');
  DB.purchases.unshift({ id:'p'+Date.now(), no:no, supplier:purchase.supplier.trim(), phone:purchase.phone.trim(), staff:staffCode(),
    desc:desc, lines:purchase.lines.map(function(l){return {itemId:l.itemId,name:l.name,unit:l.unit,rate:Number(l.rate)||0,qty:Number(l.qty)||0,amount:(Number(l.rate)||0)*(Number(l.qty)||0)};}),
    amount:total, paid:Math.min(total,paid), balance:Math.max(0,total-paid), date:purchase.date||nowISO() });
  logAct('Purchase '+no+' from '+(purchase.supplier.trim()||'supplier')+' · '+inr(total)+(total-paid>0?' (owe '+inr(total-paid)+')':''));
  saveDB(); closeSheet(); toast(no+' saved · stock updated'); render();
}

function applyPurchasePay(id){

  p.paid=Math.min(p.amount,(p.paid||0)+amt); p.balance=Math.max(0,p.amount-p.paid);
  logAct('Paid supplier '+p.supplier+' '+inr(amt)+' · '+p.no+(p.balance>0?' (owe '+inr(p.balance)+')':' (cleared)'));

============================================================ */
function pinHash(s){ var h=5381; s=String(s); for(var i=0;i<s.length;i++){ h=((h<<5)+h)+s.charCodeAt(i); h=h&0xffffffff; } return 'h'+(h>>>0); }
var _pinEntry='', _pinMode='unlock', _pinTemp='';
function lockApp(){
  if(!(DB.settings&&DB.settings.pin)) return;
  _pinMode='unlock'; _pinEntry=''; _pinTemp='';
  document.getElementById('lockTitle').textContent='Enter PIN';
  document.getElementById('lockmsg').textContent='';
  buildKeypad(); renderPinDots();
  document.getElementById('lockscreen').classList.add('show');
}
function startSetPin(){
  _pinMode='set'; _pinEntry=''; _pinTemp='';
  document.getElementById('lockTitle').textContent='Set a 4-digit PIN';
  document.getElementById('lockmsg').textContent='';
  buildKeypad(); renderPinDots();
  document.getElementById('lockscreen').classList.add('show');
}
function buildKeypad(){
  var kp=document.getElementById('keypad'); var b='';
  ['1','2','3','4','5','6','7','8','9'].forEach(function(n){ b+='<button onclick="pinPress(\''+n+'\')">'+n+'</button>'; });
  b+='<button class="fn" onclick="pinClear()">Clear</button>';
  b+='<button onclick="pinPress(\'0\')">0</button>';
  b+='<button class="fn" onclick="pinBack()">⌫</button>';
  kp.innerHTML=b;
}
function renderPinDots(){
  var d=''; for(var i=0;i<4;i++){ d+='<div class="d'+(i<_pinEntry.length?' on':'')+'"></div>'; }
  document.getElementById('pindots').innerHTML=d;
}
function pinPress(n){
  if(_pinEntry.length>=4) return;
  _pinEntry+=n; renderPinDots();
  if(_pinEntry.length===4) setTimeout(pinSubmit,120);
}
function pinBack(){ _pinEntry=_pinEntry.slice(0,-1); renderPinDots(); }
function pinClear(){ _pinEntry=''; renderPinDots(); }
function pinSubmit(){
  var msg=document.getElementById('lockmsg');
  if(_pinMode==='unlock'){
    if(pinHash(_pinEntry)===DB.settings.pin){ document.getElementById('lockscreen').classList.remove('show'); _pinEntry=''; }
    else { msg.textContent='Wrong PIN, try again'; _pinEntry=''; renderPinDots(); navigator.vibrate&&navigator.vibrate(80); }
  }else if(_pinMode==='set'){
    if(!_pinTemp){ _pinTemp=_pinEntry; _pinEntry=''; document.getElementById('lockTitle').textContent='Re-enter PIN'; renderPinDots(); }
    else {
      if(_pinTemp===_pinEntry){ DB.settings.pin=pinHash(_pinEntry); saveDB(); document.getElementById('lockscreen').classList.remove('show'); toast('App lock enabled'); if(TAB==='more')render(); }
      else { msg.textContent='PINs did not match, start again'; _pinTemp=''; _pinEntry=''; document.getElementById('lockTitle').textContent='Set a 4-digit PIN'; renderPinDots(); }
    }
  }
}
function removePin(){
  if(!confirm('Remove app lock PIN?')) return;
  DB.settings.pin=''; saveDB(); toast('App lock removed'); render();
}
function toggleLock(){
  if(DB.settings&&DB.settings.pin){ removePin(); }
  else { startSetPin(); }
}

  });
  h+='<label class="fld" style="margin-top:6px"><span class="lab">Staff code (e.g. A1, A2)</span><input class="inp" id="op_staff" value="'+esc(staffCode())+'" placeholder="A1" oninput="setStaffCode(this.value)"></label>';
  h+='<button class="btn ghost sm" style="width:100%;margin-top:4px" onclick="changeOwnerPin()">Change owner PIN</button>';
  openSheet(h);
}
function saveOwnerPin(){
  var v=(document.getElementById('op_new').value||'').trim();
  if(v.length<4){ toast('Use at least 4 digits'); return; }
  setOwnerPinHash(pinHash(v)); toast('Owner PIN set'); staffAccessSheet();
}
function changeOwnerPin(){
  var h='<h2>Change Owner PIN<button class="x" onclick="staffAccessSheet()">×</button></h2>'+
    '<label class="fld"><span class="lab">New Owner PIN (4+ digits)</span><input class="inp" id="op_new" type="password" inputmode="numeric"></label>'+
    '<button class="btn primary" onclick="saveOwnerPin()">Save PIN</button>';
  openSheet(h);
}
function applyLevel(n){
  setAccess(n); applyAccessUI(); closeSheet();
  toast('This device: '+(n===3?'Full access':(n===2?'Level 2 (staff)':'Level 1 (basic)')));
  if(((TAB==='reports'||TAB==='suppliers')&&!canFull())||(TAB==='khata'&&!canKhata())) go('home'); else render();
}

function startApp(){
  loadDB();
  migrateBillRentals();
  applyAccessUI();
  go('home');
  lockApp();
  if(cloudConfigured()) setTimeout(function(){ cloudPull(); }, 600);
  window.addEventListener('online', function(){ if(cloudConfigured()){ cloudPull().then(cloudPush); } });
}
if(window.NativeStore && NativeStore.available){
  NativeStore.hydrate(DB_KEY).then(startApp).catch(startApp);
}else{
  startApp();
}
</script>
</body>
</html>
