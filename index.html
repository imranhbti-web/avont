<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5.0">
<meta name="theme-color" content="#1C2028">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Avon Traders">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="favicon.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Avon Traders</title>
<style>
:root{
  --concrete:#EDEAE3;      /* warm light bg */
  --paper:#FFFFFF;
  --ink:#1B1A17;           /* near black warm */
  --steel:#2A303B;         /* structural dark */
  --steel-2:#3A4250;
  --galv:#6B7785;          /* muted steel */
  --line:#D8D2C7;          /* hairline */
  --ochre:#D4791B;         /* safety amber - primary */
  --ochre-deep:#B5640F;
  --wa:#1FA855;            /* whatsapp green */
  --wa-deep:#178A45;
  --due:#C0392B;           /* balance due red */
  --ok:#2E7D46;
  --shadow:0 1px 0 rgba(0,0,0,.04), 0 8px 24px -16px rgba(27,26,23,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans",sans-serif;
  background:var(--steel);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  font-size:16px;line-height:1.4;
}
#app{
  max-width:560px;margin:0 auto;min-height:100vh;background:var(--concrete);
  position:relative;display:flex;flex-direction:column;
  box-shadow:0 0 60px rgba(0,0,0,.35);
}
.tabular{font-variant-numeric:tabular-nums;}
.mono{font-feature-settings:"tnum";font-variant-numeric:tabular-nums;}

/* ---------- top bar ---------- */
.topbar{
  background:var(--steel);color:#fff;padding:calc(env(safe-area-inset-top) + 12px) 16px 12px;
  position:sticky;top:0;z-index:30;border-bottom:3px solid var(--ochre);
}
.topbar .brand{display:flex;align-items:center;gap:11px;}
.hexmark{width:34px;height:34px;flex:0 0 34px;}
.brand-txt h1{
  font-size:18px;margin:0;font-weight:800;letter-spacing:.14em;text-transform:uppercase;line-height:1;
}
.brand-txt p{margin:2px 0 0;font-size:10.5px;color:#aeb6c2;letter-spacing:.06em;text-transform:uppercase;}
.topbar .meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px;}
.chip{
  font-size:11px;letter-spacing:.04em;background:rgba(255,255,255,.08);color:#cfd6df;
  padding:5px 9px;border-radius:999px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;
}
.chip.amber{background:rgba(212,121,27,.16);color:#f0b070;}
.chip b{color:#fff;font-weight:700;}

/* ---------- content ---------- */
main{flex:1;padding:14px 14px 96px;}
.section-eyebrow{
  font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--galv);
  font-weight:700;margin:18px 2px 8px;display:flex;align-items:center;gap:8px;
}
.section-eyebrow:first-child{margin-top:2px;}
.section-eyebrow .ln{flex:1;height:1px;background:var(--line);}

.card{
  background:var(--paper);border:1px solid var(--line);border-radius:12px;
  box-shadow:var(--shadow);overflow:hidden;
}
.card + .card{margin-top:10px;}
.card-pad{padding:14px;}

/* quick search */
.searchwrap{position:relative;margin-bottom:4px;}
.searchwrap input{
  width:100%;border:1.5px solid var(--line);background:var(--paper);border-radius:12px;
  padding:14px 14px 14px 44px;font-size:16px;font-weight:600;color:var(--ink);box-shadow:var(--shadow);
}
.searchwrap input:focus{outline:none;border-color:var(--ochre);}
.searchwrap .ic{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--galv);font-size:18px;}
.searchwrap .clr{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--galv);font-size:22px;padding:6px 10px;cursor:pointer;}

/* result rows */
.rate-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);}
.rate-row:last-child{border-bottom:none;}
.rate-row .nm{font-weight:700;flex:1;min-width:0;}
.rate-row .nm small{display:block;font-weight:500;color:var(--galv);font-size:11.5px;letter-spacing:.03em;text-transform:uppercase;margin-top:2px;}
.rate-row .price{font-weight:800;font-size:17px;white-space:nowrap;}
.rate-row .price small{font-weight:600;color:var(--galv);font-size:11px;}
.rate-row.low{background:#fdf3ef;}

.badge{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;padding:3px 7px;border-radius:5px;display:inline-block;}
.badge.feat{background:var(--ochre);color:#fff;}
.badge.low{background:#fbe3dc;color:var(--due);}
.badge.out{background:var(--due);color:#fff;}
.badge.due{background:#fbe3dc;color:var(--due);}
.badge.paid{background:#e0f0e5;color:var(--ok);}
.badge.partial{background:#fdeede;color:var(--ochre-deep);}
.badge.cat{background:#eef0f3;color:var(--steel-2);}

/* buttons */
.btn{
  appearance:none;border:none;border-radius:11px;font-weight:800;letter-spacing:.02em;
  padding:14px 16px;font-size:15px;cursor:pointer;display:inline-flex;align-items:center;
  justify-content:center;gap:8px;width:100%;transition:transform .04s ease, filter .15s;
}
.btn:active{transform:scale(.985);}
.btn.primary{background:var(--ochre);color:#fff;}
.btn.steel{background:var(--steel);color:#fff;}
.btn.wa{background:var(--wa);color:#fff;}
.btn.ghost{background:transparent;color:var(--steel-2);border:1.5px solid var(--line);}
.btn.danger{background:#fff;color:var(--due);border:1.5px solid #eccfca;}
.btn.sm{padding:10px 12px;font-size:13px;border-radius:9px;width:auto;}
.btn.tiny{padding:7px 10px;font-size:12px;border-radius:8px;width:auto;gap:5px;}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{flex:1;}

/* stat tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tile{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.tile::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--galv);}
.tile.amber::before{background:var(--ochre);}
.tile.red::before{background:var(--due);}
.tile.green::before{background:var(--ok);}
.tile .lbl{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--galv);font-weight:700;}
.tile .val{font-size:23px;font-weight:800;margin-top:3px;}
.tile .val small{font-size:13px;font-weight:600;color:var(--galv);}

/* featured / promo */
.promo{
  background:linear-gradient(135deg,var(--steel) 0%, #1d2733 100%);color:#fff;border-radius:14px;
  padding:16px;position:relative;overflow:hidden;border:1px solid #0e141b;
}
.promo::after{content:"";position:absolute;right:-30px;top:-30px;width:140px;height:140px;
  background:radial-gradient(circle, rgba(212,121,27,.32), transparent 70%);}
.promo .tag{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--ochre);font-weight:800;}
.promo h3{margin:6px 0 4px;font-size:19px;letter-spacing:.02em;}
.promo p{margin:0;font-size:13px;color:#c4ccd6;}
.promo .pills{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;}
.promo .pp{font-size:11.5px;font-weight:700;background:rgba(255,255,255,.1);padding:6px 10px;border-radius:8px;}

/* lists / items */
.list-item{display:flex;gap:12px;align-items:center;padding:13px 14px;border-bottom:1px solid var(--line);}
.list-item:last-child{border-bottom:none;}
.li-main{flex:1;min-width:0;}
.li-main .t{font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.li-main .s{font-size:12px;color:var(--galv);margin-top:3px;display:flex;gap:10px;flex-wrap:wrap;}
.li-right{text-align:right;white-space:nowrap;}
.li-right .p{font-weight:800;font-size:16px;}
.li-right .m{font-size:11px;color:var(--ok);font-weight:700;}

/* forms */
label.fld{display:block;margin-bottom:12px;}
label.fld .lab{font-size:12px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--steel-2);margin-bottom:5px;display:block;}
.inp,select.inp,textarea.inp{
  width:100%;border:1.5px solid var(--line);border-radius:10px;padding:12px;font-size:16px;
  font-family:inherit;color:var(--ink);background:var(--paper);
}
.inp:focus{outline:none;border-color:var(--ochre);}
textarea.inp{resize:vertical;min-height:64px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.switch{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0;border-top:1px solid var(--line);}
.switch .lab{font-weight:700;font-size:14px;}
.switch .sub{font-size:12px;color:var(--galv);font-weight:500;margin-top:2px;}
.toggle{width:48px;height:28px;border-radius:999px;background:#cfcabf;position:relative;flex:0 0 48px;cursor:pointer;transition:background .15s;}
.toggle.on{background:var(--ochre);}
.toggle::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.3);}
.toggle.on::after{left:23px;}

/* bottom sheet / modal */
.sheet-bg{position:fixed;inset:0;background:rgba(20,22,28,.55);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.sheet-bg.show{display:flex;}
.sheet{
  background:var(--concrete);width:100%;max-width:560px;border-radius:18px 18px 0 0;
  max-height:92vh;overflow-y:auto;padding:8px 14px calc(env(safe-area-inset-bottom) + 18px);
  animation:up .22s ease;
}
@keyframes up{from{transform:translateY(40px);opacity:.6;}to{transform:translateY(0);opacity:1;}}
.sheet-grab{width:40px;height:4px;border-radius:3px;background:#cabfb0;margin:8px auto 4px;}
.sheet h2{font-size:18px;margin:6px 2px 14px;letter-spacing:.02em;display:flex;align-items:center;justify-content:space-between;}
.sheet h2 .x{background:none;border:none;font-size:26px;color:var(--galv);cursor:pointer;line-height:1;padding:0 4px;}

/* line items in bill */
.lineitem{display:flex;gap:8px;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line);}
.lineitem .nm{flex:1;min-width:0;font-weight:700;font-size:14px;}
.lineitem .nm small{display:block;color:var(--galv);font-weight:500;font-size:11.5px;}
.qtybox{display:flex;align-items:center;border:1.5px solid var(--line);border-radius:9px;overflow:hidden;}
.qtybox button{width:32px;height:36px;border:none;background:#f1ede5;font-size:18px;font-weight:800;color:var(--steel-2);cursor:pointer;}
.qtybox input{width:42px;border:none;text-align:center;font-weight:800;font-size:15px;padding:0;}
.lineitem .amt{font-weight:800;width:74px;text-align:right;font-size:14px;}
.lineitem .rm{background:none;border:none;color:var(--due);font-size:18px;padding:4px 2px;cursor:pointer;}

/* invoice preview */
.doc{background:#fff;border:1px solid var(--line);border-radius:12px;padding:18px;font-size:13px;color:#222;box-shadow:var(--shadow);}
.doc .dh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--steel);padding-bottom:10px;}
.doc .dh h3{margin:0;font-size:18px;letter-spacing:.1em;text-transform:uppercase;}
.doc .dh p{margin:2px 0 0;font-size:11px;color:#666;}
.doc table{width:100%;border-collapse:collapse;margin-top:10px;}
.doc th{text-align:left;font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:#888;border-bottom:1px solid #ddd;padding:6px 4px;}
.doc td{padding:7px 4px;border-bottom:1px solid #eee;font-size:12.5px;vertical-align:top;}
.doc td.r,.doc th.r{text-align:right;}
.doc .tot{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;}
.doc .tot.g{font-weight:800;font-size:16px;border-top:2px solid var(--steel);margin-top:6px;padding-top:8px;}
.doc .terms{margin-top:12px;font-size:10.5px;color:#777;border-top:1px dashed #ccc;padding-top:8px;}
.doc .terms b{color:#444;display:block;margin-bottom:3px;letter-spacing:.05em;text-transform:uppercase;font-size:10px;}

/* empty state */
.empty{text-align:center;padding:36px 20px;color:var(--galv);}
.empty .big{font-size:34px;margin-bottom:8px;}
.empty p{margin:4px 0;font-size:14px;}

/* banner */
.banner{display:flex;gap:10px;align-items:center;background:#fdf3e7;border:1px solid #f0d9b8;border-radius:11px;padding:11px 13px;margin-bottom:10px;}
.banner .bi{font-size:20px;}
.banner .bt{flex:1;font-size:13px;font-weight:600;color:#8a5a13;}
.banner.green{background:#eaf5ee;border-color:#bfe0cb;}
.banner.green .bt{color:#1f6b3a;}

/* bottom nav */
.bottomnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;
  background:var(--steel);display:flex;z-index:40;border-top:1px solid #0e141b;
  padding-bottom:env(safe-area-inset-bottom);
}
.navbtn{flex:1;background:none;border:none;color:#8b95a3;padding:9px 4px 8px;font-size:10.5px;font-weight:700;
  letter-spacing:.03em;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;}
.navbtn .ni{font-size:20px;line-height:1;}
.navbtn.active{color:var(--ochre);}
.navbtn.fab{color:#fff;}
.navbtn.fab .ni{background:var(--ochre);width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-top:-14px;box-shadow:0 6px 14px -4px rgba(212,121,27,.7);font-size:24px;}

/* toast */
#toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;
  padding:12px 18px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;z-index:60;pointer-events:none;max-width:90%;text-align:center;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.muted{color:var(--galv);}
.right{text-align:right;}
.hr{height:1px;background:var(--line);margin:14px 0;}
.spacer{height:8px;}
.center{text-align:center;}
.flex{display:flex;align-items:center;gap:8px;}
.between{display:flex;align-items:center;justify-content:space-between;gap:8px;}
a.link{color:var(--ochre-deep);font-weight:700;text-decoration:none;}

@media print{
  body{background:#fff;}
  #app{box-shadow:none;}
  .topbar,.bottomnav,#toast,.no-print{display:none !important;}
  main{padding:0;}
}

/* lock screen */
#lockscreen{position:fixed;inset:0;z-index:200;background:var(--steel);display:none;
  flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#lockscreen.show{display:flex;}
.lockbox{width:100%;max-width:300px;text-align:center;color:#fff;}
.lockbox h2{font-size:18px;font-weight:700;letter-spacing:.03em;margin:14px 0 18px;}
.pindots{display:flex;gap:14px;justify-content:center;height:18px;margin-bottom:8px;}
.pindots .d{width:14px;height:14px;border-radius:50%;border:2px solid #6B7785;}
.pindots .d.on{background:var(--ochre);border-color:var(--ochre);}
.lockmsg{font-size:13px;color:#e08a8a;min-height:18px;margin-bottom:14px;font-weight:600;}
.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.keypad button{height:62px;border-radius:50%;border:none;background:#343b48;color:#fff;font-size:24px;font-weight:700;cursor:pointer;}
.keypad button:active{background:#3f4756;}
.keypad button.fn{background:transparent;font-size:15px;font-weight:700;color:#9aa4b2;}
.thumb{width:46px;height:46px;border-radius:9px;object-fit:cover;border:1px solid var(--line);background:#f1ede5;flex:0 0 46px;}
.thumb-sm{width:30px;height:30px;border-radius:6px;object-fit:cover;flex:0 0 30px;}
.menu-row{display:flex;align-items:center;gap:13px;padding:15px 14px;border-bottom:1px solid var(--line);cursor:pointer;}
.menu-row:last-child{border-bottom:none;}
.menu-row .mi{font-size:22px;width:30px;text-align:center;}
.menu-row .mt{flex:1;font-weight:700;font-size:15px;}
.menu-row .ms{font-size:12px;color:var(--galv);font-weight:500;margin-top:1px;}
.menu-row .ar{color:var(--galv);font-size:20px;}
.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.rep-card{background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:13px 14px;box-shadow:var(--shadow);}
.rep-card .l{font-size:11px;letter-spacing:.07em;text-transform:uppercase;color:var(--galv);font-weight:700;}
.rep-card .v{font-size:20px;font-weight:800;margin-top:3px;}
.rep-card .c{font-size:11px;color:var(--galv);margin-top:2px;}
.bar-row{display:flex;align-items:center;gap:9px;margin:7px 0;}
.bar-row .bl{width:64px;font-size:12px;font-weight:700;color:var(--steel-2);flex:0 0 64px;}
.bar-track{flex:1;height:9px;background:#e7e2d8;border-radius:5px;overflow:hidden;}
.bar-fill{height:100%;background:var(--ochre);border-radius:5px;}
.bar-row .bv{font-size:12px;font-weight:700;width:78px;text-align:right;flex:0 0 78px;}
.iw-head,.iw-row{display:flex;align-items:center;padding:9px 13px;gap:8px;}
.iw-head{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--galv);font-weight:700;border-bottom:1px solid var(--line);}
.iw-row{border-bottom:1px solid #F0ECE3;font-size:13px;}
.iw-row:last-child{border-bottom:none;}
.iw-n{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;}
.iw-q{flex:0 0 80px;text-align:right;color:var(--galv);}
.iw-a{flex:0 0 82px;text-align:right;font-weight:700;}
.pur-line{padding:11px 13px;border-bottom:1px solid var(--line);}
.pur-line:last-child{border-bottom:none;}
.pl-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.pl-nm{font-weight:700;font-size:14px;}
.pl-x{background:none;border:none;font-size:15px;cursor:pointer;padding:2px 4px;color:var(--due);}
.pl-in{display:flex;align-items:flex-end;gap:8px;}
.pl-lab{flex:1;font-size:11px;color:var(--galv);display:flex;flex-direction:column;gap:3px;font-weight:600;}
.pl-lab input{border:1px solid var(--line);border-radius:8px;padding:8px;font-size:14px;width:100%;background:var(--paper);}
.pl-amt{flex:0 0 76px;text-align:right;font-weight:800;font-size:14px;padding-bottom:8px;}
.cbsw{position:relative;display:inline-block;width:44px;height:26px;}
.cbsw input{opacity:0;width:0;height:0;}
.cbsw .sl{position:absolute;inset:0;background:#c9c3b6;border-radius:26px;transition:.2s;cursor:pointer;}
.cbsw .sl:before{content:"";position:absolute;height:20px;width:20px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;}
.cbsw input:checked + .sl{background:var(--ok);}
.cbsw input:checked + .sl:before{transform:translateX(18px);}
.log-row{display:flex;gap:10px;padding:9px 13px;border-bottom:1px solid #F0ECE3;align-items:flex-start;}
.log-row:last-child{border-bottom:none;}
.log-row .lw{flex:0 0 34px;font-weight:800;font-size:12px;color:var(--ochre-deep);background:#FBEEDD;border-radius:6px;text-align:center;padding:3px 0;}
.log-row .lm{flex:1;min-width:0;font-size:12.5px;}
.log-row .lt{color:var(--galv);font-size:10.5px;margin-top:2px;}
.miciwrap{position:relative;}
.miciwrap textarea{padding-right:46px;}
.micbtn{position:absolute;top:8px;right:8px;width:34px;height:34px;border-radius:50%;border:none;background:var(--ochre);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.micbtn.rec{background:var(--due);animation:micpulse 1s infinite;}
@keyframes micpulse{0%{box-shadow:0 0 0 0 rgba(192,57,43,.5)}70%{box-shadow:0 0 0 10px rgba(192,57,43,0)}100%{box-shadow:0 0 0 0 rgba(192,57,43,0)}}
.ai-glow{background:linear-gradient(135deg,#2563EB,#3B82F6);color:#fff;border:none;font-weight:800;
  box-shadow:0 0 0 0 rgba(59,130,246,.55);animation:aiglow 2.2s ease-in-out infinite;}
@keyframes aiglow{0%{box-shadow:0 0 0 0 rgba(59,130,246,.55)}70%{box-shadow:0 0 14px 6px rgba(59,130,246,.15)}100%{box-shadow:0 0 0 0 rgba(59,130,246,0)}}
.seg{display:flex;gap:6px;background:#e7e2d8;border-radius:10px;padding:4px;margin:10px 0;}
.seg button{flex:1;border:none;background:none;padding:8px;border-radius:7px;font-weight:700;font-size:12.5px;color:var(--steel-2);cursor:pointer;}
.seg button.on{background:#fff;color:var(--ochre-deep);box-shadow:var(--shadow);}
</style>

function loadDB(){
  var raw=Store.get(DB_KEY);
  if(raw){
    try{ DB=JSON.parse(raw); }catch(e){ DB=null; }
  }
  if(!DB){
    DB=JSON.parse(JSON.stringify(DEFAULTS));
    DB.items=seedItems();
    saveDB();
  }
  // backfill any missing keys
  for(var k in DEFAULTS){ if(!(k in DB)) DB[k]=JSON.parse(JSON.stringify(DEFAULTS[k])); }
  // backfill nested settings (e.g. sync added later)
  if(!DB.settings) DB.settings=JSON.parse(JSON.stringify(DEFAULTS.settings));
  for(var sk in DEFAULTS.settings){ if(!(sk in DB.settings)) DB.settings[sk]=JSON.parse(JSON.stringify(DEFAULTS.settings[sk])); }
  if(!DB.settings.sync) DB.settings.sync=JSON.parse(JSON.stringify(DEFAULTS.settings.sync));
  for(var yk in DEFAULTS.settings.sync){ if(!(yk in DB.settings.sync)) DB.settings.sync[yk]=DEFAULTS.settings.sync[yk]; }
}
/* write to local durable stores only (no cloud push) */
function persistLocal(){ var s=JSON.stringify(DB); Store.set(DB_KEY, s); if(window.NativeStore && NativeStore.available){ try{ NativeStore.persist(s); }catch(e){} } return s; }
function saveDB(){ DB.updatedAt=Date.now(); persistLocal(); cloudPushDebounced(); }

/* ============================================================
   CLOUD SYNC — free, serverless (Cloudflare Worker + KV)
   Full-document last-write-wins by updatedAt. Owner deploys one
   Worker; each shop/device pair shares a shop id + secret token.
============================================================ */
function syncCfg(){ return (DB.settings&&DB.settings.sync)||{}; }
function cloudConfigured(){ var c=syncCfg(); return !!(c.enabled && c.url && c.shop && c.token); }
function cloudEndpoint(){ var c=syncCfg(); var u=c.url.replace(/\/+$/,''); return u+'/?shop='+encodeURIComponent(c.shop); }
function cloudHeaders(){ return { 'Content-Type':'application/json', 'Authorization':'Bearer '+syncCfg().token }; }
function fetchT(url,opts,ms){
  return new Promise(function(res,rej){
    var ctrl=('AbortController'in window)?new AbortController():null;
    var to=setTimeout(function(){ if(ctrl)ctrl.abort(); rej(new Error('timeout')); }, ms||12000);
    if(ctrl) opts.signal=ctrl.signal;
    fetch(url,opts).then(function(r){ clearTimeout(to); res(r); }).catch(function(e){ clearTimeout(to); rej(e); });
  });
}
var _pushT=null, _pushing=false;
function cloudPushDebounced(){
  if(!cloudConfigured()) return;
  if(!navigator.onLine) return;
  if(_pushT) clearTimeout(_pushT);
  _pushT=setTimeout(function(){ cloudPush(); }, 1200);
}
function cloudPush(){
  if(!cloudConfigured()||_pushing) return Promise.resolve(false);
  if(!navigator.onLine) return Promise.resolve(false);
  _pushing=true;
  var payload=JSON.stringify({ updatedAt:DB.updatedAt||Date.now(), data:DB });
  return fetchT(cloudEndpoint(),{ method:'POST', headers:cloudHeaders(), body:payload })
    .then(function(r){ if(!r.ok) throw new Error('push '+r.status); return r.json(); })
    .then(function(){ DB.settings.sync.lastPush=Date.now(); persistLocal(); updateSyncBadge(); return true; })
    .catch(function(){ return false; })
    .then(function(v){ _pushing=false; return v; });
}
function cloudPull(){
  if(!cloudConfigured()) return Promise.resolve(false);
  if(!navigator.onLine) return Promise.resolve(false);
  return fetchT(cloudEndpoint(),{ method:'GET', headers:cloudHeaders() })
    .then(function(r){ if(r.status===404) return null; if(!r.ok) throw new Error('pull '+r.status); return r.json(); })
    .then(function(remote){
      DB.settings.sync.lastPull=Date.now();
      if(remote && remote.data && (Number(remote.updatedAt)||0) > (Number(DB.updatedAt)||0)){
        var keepSync=DB.settings.sync;               // never let remote overwrite this device's creds
        DB=remote.data;
        if(!DB.settings) DB.settings={};
        DB.settings.sync=keepSync;
        DB.updatedAt=Number(remote.updatedAt)||Date.now();
        persistLocal();
        if(typeof render==='function') render();
        toast('Synced from cloud');
      }else{
        persistLocal();
      }
      updateSyncBadge();
      return true;
    })
    .catch(function(){ return false; });
}
function syncNow(){
  if(!cloudConfigured()){ toast('Set up cloud sync first'); return; }
  toast('Syncing…');
  cloudPull().then(function(){ return cloudPush(); }).then(function(){ toast('Sync complete'); if(TAB==='more')render(); });
}
function genSyncCreds(){
  function rnd(n){ var s='',a='abcdefghijklmnopqrstuvwxyz0123456789'; for(var i=0;i<n;i++)s+=a[Math.floor(Math.random()*a.length)]; return s; }
  DB.settings.sync.shop='avon-'+rnd(6);
  DB.settings.sync.token=rnd(24);
  saveDB(); render();
}
function toggleSync(on){ DB.settings.sync.enabled=!!on; saveDB(); render(); if(on&&cloudConfigured()) syncNow(); }
function toggleAI(on){ DB.settings.ai.enabled=!!on; saveDB(); render(); }
function setAIField(k,v){ DB.settings.ai[k]=(v||'').trim(); persistLocal(); }
function setSyncField(k,v){ DB.settings.sync[k]=(v||'').trim(); DB.settings.sync.lastPush=0; DB.settings.sync.lastPull=0; persistLocal(); updateSyncBadge(); }
function shareSyncCreds(){
  var c=syncCfg();
  var msg='Avon Traders — cloud sync setup\nWorker URL: '+(c.url||'(paste your Worker URL)')+'\nShop ID: '+(c.shop||'')+'\nToken: '+(c.token||'')+'\n\nOpen the app → More → Cloud Sync, turn it on, and paste these three the same on this device.';
  if(navigator.share){ navigator.share({title:'Avon Traders sync',text:msg}).catch(function(){}); }
  else { openWA('', msg); }
}
function updateSyncBadge(){ var el=document.getElementById('syncStatus'); if(el) el.textContent=syncStatusText(); }
function syncStatusText(){
  var c=syncCfg();
  if(!c.enabled) return 'Off';
  if(!c.url||!c.shop||!c.token) return 'Not configured';
  if(!navigator.onLine) return 'Offline — will sync later';
  var t=Math.max(c.lastPush||0,c.lastPull||0);
  return t?('Last synced '+timeAgo(t)):'Ready';
}
function timeAgo(ts){ var s=Math.floor((Date.now()-ts)/1000); if(s<60)return 'just now'; var m=Math.floor(s/60); if(m<60)return m+'m ago'; var h=Math.floor(m/60); if(h<24)return h+'h ago'; return Math.floor(h/24)+'d ago'; }

/* ============================================================
   AI ASSISTANT — via your own Cloudflare AI Worker (holds the API key).
   Online + small per-use cost. Owner only. Three tools:
   ask-your-data · voice/text billing · photo bill → app format.
============================================================ */
function aiCfg(){ return (DB.settings&&DB.settings.ai)||{}; }
function aiReady(){ var c=aiCfg(); return !!(c.enabled&&c.url&&c.token); }
function aiCall(system,messages,maxTokens){
  var c=aiCfg();
  var body=JSON.stringify({ system:system, messages:messages, max_tokens:maxTokens||1024 });
  return fetchT(c.url.replace(/\/+$/,''),{ method:'POST', headers:{'Content-Type':'application/json','Authorization':'Bearer '+c.token}, body:body }, 45000)
    .then(function(r){ if(!r.ok) return r.text().then(function(t){ throw new Error('AI '+r.status+' '+t.slice(0,120)); }); return r.json(); })
    .then(function(j){ return (j.text!=null)?j.text:(j.answer!=null?j.answer:''); });
}
/* strip ```json fences and parse the first {...} or [...] found */
function parseAIJson(txt){
  if(!txt) return null;
  var s=txt.replace(/```json/gi,'').replace(/```/g,'').trim();
  try{ return JSON.parse(s); }catch(e){}
  var m=s.match(/[\[{][\s\S]*[\]}]/);
  if(m){ try{ return JSON.parse(m[0]); }catch(e){} }
  return null;
}
/* compact snapshot of the shop for "ask your data" */
function buildDataSummary(){
  var mF=startOf('month');
  var pf=periodFigures(mF,null);
  var items=DB.items.map(function(i){return {name:i.name,cat:i.cat,stock:i.stock,unit:i.unit,sell:i.sell,buy:i.buy,rentable:!!i.rentable};});
  var dues=debtors().map(function(d){return {who:d.name,no:d.no,type:d.kind,balance:d.bal};});
  var low=lowStockItems().map(function(i){return {name:i.name,stock:i.stock,min:i.min,unit:i.unit};});
  var iwSales=itemWiseSales(0,null).slice(0,20);

  /* last 6 calendar months, by name, for item sales / rental income / expenses / purchases */
  var base=new Date(); base.setDate(1); base.setHours(0,0,0,0);
  var months=[];
  for(var j=5;j>=0;j--){
    var ms=new Date(base.getFullYear(),base.getMonth()-j,1).getTime();
    var me=new Date(base.getFullYear(),base.getMonth()-j+1,1).getTime();
    var mpf=periodFigures(ms,me);
    months.push({
      month: new Date(ms).toLocaleDateString('en-IN',{month:'long',year:'numeric'}),
      item_sales: mpf.items, rental_income: mpf.rent, expenses: mpf.exp,
      purchases: purVal(ms,me), gross_profit: grossProfit(ms,me), net_profit: netProfit(ms,me)
    });
  }

  /* expenses: by category, this month + all-time; recent entries for detail questions */
  var expCatMonth=expByCat(mF,null);
  var expCatAll=expByCat(0,null);
  var recentExp=(DB.expenses||[]).slice().sort(function(a,b){return new Date(b.date)-new Date(a.date);}).slice(0,25)
    .map(function(e){return {date:e.date.slice(0,10),cat:e.cat,amount:e.amount,note:e.note||''};});

  /* purchases: item-wise all-time + recent purchase records */
  var purIW=purchaseItemWise(0,null).slice(0,20);
  var recentPur=(DB.purchases||[]).slice(0,25).map(function(p){
    return {date:p.date.slice(0,10),no:p.no,supplier:p.supplier,amount:p.amount,paid:p.paid,balance:p.balance};
  });

  /* rentals: active (not yet returned) with due date + overdue flag, and recent returned */
  var todayMs=Date.now();
  var activeR=(DB.rentals||[]).filter(function(r){return !r.returned;}).map(function(r){
    var due=r.dueDate?new Date(r.dueDate).getTime():null;
    return { no:r.no, customer:r.cust.name, items:(r.items||[]).map(function(it){return it.qty+' '+it.unit+' '+it.name;}).join(', '),
      due_date:r.dueDate?r.dueDate.slice(0,10):null, overdue: due?(due<todayMs):false, deposit:r.deposit||0 };
  });
  var returnedRecent=(DB.rentals||[]).filter(function(r){return r.returned;}).slice(0,15).map(function(r){
    return { no:r.no, customer:r.cust.name, returned_date:r.returnedDate?r.returnedDate.slice(0,10):null,
      rent_amount:rentalNet(r), paid:r.paid||0, balance:rentalBalance(r) };
  });
  var rentalItemStats=rentalItemWise();

  return {
    shop:DB.shop.name, today:new Date().toISOString().slice(0,10),
    this_month:{ item_sales:pf.items, rental_sales:pf.rent, expenses:pf.exp, purchases:purVal(mF,null), gross_profit:grossProfit(mF,null), net_profit:netProfit(mF,null) },
    all_time:{ item_sales:allItemSales(), rental_sales:allRentSales(), purchases:allPurchases(), supplier_payable:supplierPayable(), expenses:allExpenses() },
    monthly_history_last_6_months: months,
    outstanding_total:totalOutstanding(),
    items:items, low_stock:low, dues:dues, top_selling_items:iwSales,
    expenses:{ by_category_this_month:expCatMonth, by_category_all_time:expCatAll, recent_entries:recentExp },
    purchases:{ item_wise_all_time:purIW, recent_purchases:recentPur, supplier_payable_total:supplierPayable() },
    rentals:{ active_not_returned:activeR, active_count:activeR.length, overdue_count:activeR.filter(function(r){return r.overdue;}).length,
      recently_returned:returnedRecent, item_wise_all_time:rentalItemStats }
  };
}
function openAI(){

/* generic continuous mic: keeps listening + appending until tapped again */
var _aiRec={}; // fieldId -> {recognition, active, timer}
function aiMicToggle(fieldId,btnId){
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition; if(!SR){ toast('Voice not supported on this browser'); return; }
  var state=_aiRec[fieldId];
  var btn=document.getElementById(btnId);
  if(state && state.active){
    state.active=false; if(state.timer) clearTimeout(state.timer); state.recognition.stop();
    if(btn){ btn.classList.remove('rec'); btn.textContent='🎙️'; }
    return;
  }
  var r=new SR(); r.lang='hi-IN'; r.continuous=true; r.interimResults=false; r.maxAlternatives=1;
  state={recognition:r, active:true, timer:null}; _aiRec[fieldId]=state;
  if(btn){ btn.classList.add('rec'); btn.textContent='⏹️'; }
  function bumpSilenceTimer(){
    if(state.timer) clearTimeout(state.timer);
    state.timer=setTimeout(function(){ if(state.active){ state.active=false; try{r.stop();}catch(e){} if(btn){btn.classList.remove('rec');btn.textContent='🎙️';} } },30000);
  }
  bumpSilenceTimer();
  r.onresult=function(e){
    var txt=''; for(var i=e.resultIndex;i<e.results.length;i++){ if(e.results[i].isFinal) txt+=e.results[i][0].transcript+' '; }
    if(txt.trim()){ var el=document.getElementById(fieldId); if(el) el.value=(el.value?el.value.trim()+' ':'')+txt.trim(); }
    bumpSilenceTimer();
  };
  r.onerror=function(ev){ if(ev.error==='not-allowed'){ toast('Microphone permission denied'); state.active=false; if(state.timer) clearTimeout(state.timer); if(btn){btn.classList.remove('rec');btn.textContent='🎙️';} } };
  r.onend=function(){
    // some browsers stop after a pause even in continuous mode — auto-restart while still active
    if(state.active){ try{ r.start(); }catch(e){} }
    else{ if(state.timer) clearTimeout(state.timer); if(btn){ btn.classList.remove('rec'); btn.textContent='🎙️'; } }
  };
  try{ r.start(); }catch(e){ toast('Could not start microphone'); }
}

/* ---------- helpers ---------- */
function inr(n){
  n=Number(n)||0;
  var neg=n<0; n=Math.abs(n);
  var s=n.toFixed(2).replace(/\.00$/,'');
  var parts=s.split('.'); var x=parts[0];
  var last3=x.slice(-3), rest=x.slice(0,-3);
  if(rest) last3=','+last3;
  rest=rest.replace(/\B(?=(\d{2})+(?!\d))/g,',');
  var out=rest+last3+(parts[1]?'.'+parts[1]:'');
  return (neg?'-':'')+'₹'+out;
}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function todayStr(){var d=new Date();return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fmtDate(ts){return new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});}
function fmtTime(ts){return new Date(ts).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});}
function fmtDateTime(ts){return fmtDate(ts)+', '+fmtTime(ts);}
function nowISO(){return new Date().toISOString();}
function daysSince(ts){ if(!ts) return 999; return Math.floor((Date.now()-ts)/86400000); }
function cleanPhone(p){ p=String(p||'').replace(/\D/g,''); if(p.length===10) p='91'+p; return p; }
function byId(id){return DB.items.find(function(x){return x.id===id;});}

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(function(){t.classList.remove('show');},2200);
}

function logAct(text){
  if(!DB.log) DB.log=[];
  DB.log.unshift({ t:Date.now(), who:staffCode()||'—', act:text });
  if(DB.log.length>600) DB.log=DB.log.slice(0,600);
}
function clearLog(){ if(!confirm('Clear the activity log?'))return; DB.log=[]; saveDB(); render(); }

function go(tab){
  if(tab==='more' && !_moreUnlocked){ moreLockPrompt(); return; }
  if((tab==='reports'||tab==='suppliers') && !canFull()){ toast('🔒 Owner access only'); tab='home'; }
  if(tab==='khata' && !canKhata()){ toast('🔒 Not allowed on this device'); tab='home'; }
  TAB=tab;
  if(tab!=='items') lowOnly=false;
  if(tab==='bill'){ openBillBuilder(); return; }
  document.querySelectorAll('.navbtn').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab===tab && tab!=='bill');
  });
  render();
}
document.querySelectorAll('.navbtn').forEach(function(b){
  b.addEventListener('click',function(){ go(b.dataset.tab); });
});

function render(){
  var v=document.getElementById('view');
  if((TAB==='reports'||TAB==='suppliers') && !canFull()){ v.innerHTML=accessDenied(); window.scrollTo(0,0); return; }
  if(TAB==='khata' && !canKhata()){ v.innerHTML=accessDenied(); window.scrollTo(0,0); return; }
  if(TAB==='home') v.innerHTML=viewHome();
  else if(TAB==='items') v.innerHTML=viewItems();
  else if(TAB==='khata') v.innerHTML=viewKhata();
  else if(TAB==='more') v.innerHTML=viewMore();
  else if(TAB==='reports') v.innerHTML=viewReports();
  else if(TAB==='rentals') v.innerHTML=viewRentals();
  else if(TAB==='expenses') v.innerHTML=viewExpenses();
  else if(TAB==='suppliers') v.innerHTML=viewSuppliers();
  window.scrollTo(0,0);
  if(TAB==='items') wireItemSearch();
  if(TAB==='home') wireQuickSearch();
}

function lowStockItems(){ return DB.items.filter(function(i){return i.stock<=i.min;}); }
function activeRentals(){ return (DB.rentals||[]).filter(function(r){return !r.returned;}); }
var lowOnly=false;
function showLowStock(){ lowOnly=true; itemFilter='all'; go('items'); }
function outstanding(){
  return DB.invoices.filter(function(x){return x.type==='invoice' && x.balance>0;});
}
function totalDue(){ return totalOutstanding(); }
function pendingDeliveries(){ return DB.invoices.filter(function(x){return x.type==='invoice' && x.delivery && !x.delivered;}); }

function rateRowHTML(i){
  var badge = i.stock<=0?'<span class="badge out">OUT</span> '
            : i.stock<=i.min?'<span class="badge low">LOW</span> ':'';
  return '<div class="rate-row'+(i.stock<=i.min?' low':'')+'">'+
    '<div class="nm">'+esc(i.name)+(i.feat?' <span class="badge feat">★</span>':'')+
      '<small>'+esc(i.cat)+' · '+i.stock+' '+esc(i.unit)+' in stock</small></div>'+
    '<div class="price">'+badge+inr(i.sell)+' <small>/'+esc(i.unit)+'</small></div></div>';
}

function wireQuickSearch(){
  var inp=document.getElementById('qsearch'), res=document.getElementById('qresults'), clr=document.getElementById('qclr');
  if(!inp) return;
  function run(){
    var q=inp.value.trim().toLowerCase();
    clr.style.display=q?'block':'none';
    if(!q){ res.innerHTML=''; return; }
    var m=DB.items.filter(function(i){return (i.name+' '+i.cat).toLowerCase().indexOf(q)>=0;})
                  .sort(function(a,b){return a.name.localeCompare(b.name);}).slice(0,12);
    if(!m.length){ res.innerHTML='<div class="card card-pad muted center">No item matches “'+esc(q)+'”. <a class="link" onclick="openItemForm()">Add it?</a></div>'; return; }
    res.innerHTML='<div class="card" style="margin-top:8px">'+m.map(rateRowHTML).join('')+'</div>';
  }
  inp.addEventListener('input',run);
  clr.addEventListener('click',function(){inp.value='';run();inp.focus();});
}

function markDelivered(id){
  var x=DB.invoices.find(function(i){return i.id===id;});
  if(x){ x.delivered=true; saveDB(); toast('Marked delivered'); render(); }
}

var itemFilter='all';
function viewItems(){
  var h='';
  if(lowOnly){
    h+='<div class="banner"><span class="bi">⚠️</span><div class="bt">Showing low / out-of-stock items only.</div>'+
       '<button class="btn ghost tiny" onclick="lowOnly=false;render()">Show all</button></div>';
  }
  h+='<div class="searchwrap"><span class="ic">🔍</span>'+
     '<input id="isearch" type="text" autocomplete="off" placeholder="Search items…">'+
     '<button class="clr" id="iclr" style="display:none">×</button></div>';

  /* category filter pills */
  h+='<div style="display:flex;gap:7px;overflow-x:auto;padding:10px 0 4px;-webkit-overflow-scrolling:touch">';
  h+=catPill('all','All');
  CATS.forEach(function(c){ h+=catPill(c,c); });
  h+='</div>';

  h+='<button class="btn primary" onclick="openItemForm()" style="margin:4px 0 10px">➕ Add New Item</button>';

  h+='<div id="ilist"></div>';
  // initial list rendered by wireItemSearch
  setTimeout(wireItemSearch,0);
  return h;
}
function catPill(val,label){
  var on=itemFilter===val;
  return '<button class="btn '+(on?'primary':'ghost')+' tiny" style="white-space:nowrap" onclick="itemFilter=\''+val.replace(/'/g,"\\'")+'\';render()">'+esc(label)+'</button>';
}

function itemListHTML(q){
  q=(q||'').trim().toLowerCase();
  var arr=DB.items.filter(function(i){
    if(lowOnly && i.stock>i.min) return false;
    if(itemFilter!=='all' && i.cat!==itemFilter) return false;
    if(q && (i.name+' '+i.cat).toLowerCase().indexOf(q)<0) return false;
    return true;
  }).sort(function(a,b){
    if((b.feat?1:0)!==(a.feat?1:0)) return (b.feat?1:0)-(a.feat?1:0);
    return a.name.localeCompare(b.name);
  });
  if(!arr.length) return '<div class="empty"><div class="big">📦</div><p>No items here.</p><p class="muted">Tap “Add New Item” to create one.</p></div>';
  var h='<div class="card">';
  var _full=canFull();
  arr.forEach(function(i){
    var margin = i.sell-i.buy;
    var mpct = i.buy>0 ? Math.round(margin/i.buy*100) : 0;
    var thumb = i.photo ? '<img class="thumb" src="'+i.photo+'" alt="">' : '<div class="thumb" style="display:flex;align-items:center;justify-content:center;font-size:18px;color:#b9b2a4">📦</div>';
    h+='<div class="list-item" onclick="openItemForm(\''+i.id+'\')">'+
        thumb+
        '<div class="li-main"><div class="t">'+esc(i.name)+
          (i.feat?' <span class="badge feat">★ Special</span>':'')+
          (i.rentable?' <span class="badge cat">🔁 Rent</span>':'')+
          (i.stock<=0?' <span class="badge out">OUT</span>':(i.stock<=i.min?' <span class="badge low">LOW</span>':''))+
        '</div>'+
        '<div class="s"><span class="badge cat">'+esc(i.cat)+'</span>'+
          (_full?'<span>Buy '+inr(i.buy)+'</span>':'')+'<span>Stock '+i.stock+' '+esc(i.unit)+'</span></div></div>'+
        '<div class="li-right"><div class="p tabular">'+inr(i.sell)+'</div>'+
          (_full?'<div class="m">'+(margin>=0?'+':'')+inr(margin)+' ('+mpct+'%)</div>':'')+'</div>'+
        '</div>';
  });
  h+='</div>';
  return h;
}

function wireItemSearch(){
  var list=document.getElementById('ilist'); if(!list) return;
  var inp=document.getElementById('isearch'), clr=document.getElementById('iclr');
  function run(){ list.innerHTML=itemListHTML(inp?inp.value:''); if(clr)clr.style.display=(inp&&inp.value)?'block':'none'; }
  if(inp) inp.addEventListener('input',run);
  if(clr) clr.addEventListener('click',function(){inp.value='';run();inp.focus();});
  run();
}

function onItemPhoto(input){
  var f=input.files&&input.files[0]; if(!f) return;
  var rd=new FileReader();
  rd.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=400, w=img.width, hh=img.height;
      if(w>hh){ if(w>max){ hh=Math.round(hh*max/w); w=max; } }
      else { if(hh>max){ w=Math.round(w*max/hh); hh=max; } }
      var cv=document.createElement('canvas'); cv.width=w; cv.height=hh;
      cv.getContext('2d').drawImage(img,0,0,w,hh);
      var data=cv.toDataURL('image/jpeg',0.7);
      var prev=document.getElementById('f_photo_prev');
      prev.src=data; prev.style.display='block';
      var ph=document.getElementById('f_photo_ph'); if(ph) ph.style.display='none';
    };
    img.src=rd.result;
  };
  rd.readAsDataURL(f);
}
function clearItemPhoto(){
  var prev=document.getElementById('f_photo_prev'); prev.src=''; prev.style.display='none';
  var ph=document.getElementById('f_photo_ph'); if(ph) ph.style.display='flex';
}
function currentItemPhoto(){
  var prev=document.getElementById('f_photo_prev');
  var s=prev?prev.getAttribute('src'):'';
  return (s&&s.indexOf('data:')===0)?s:'';
}

function saveItem(id){
  var name=document.getElementById('f_name').value.trim();
  if(!name){ toast('Enter item name'); return; }
  var prev = id ? byId(id) : null;
  var elBuy=document.getElementById('f_buy');
  var elFeat=document.getElementById('f_feat');
  var elRent=document.getElementById('f_rent');
  var elRR=document.getElementById('f_rentrate');
  var rentOn = elRent ? elRent.classList.contains('on') : (prev?!!prev.rentable:false);
  var obj={
    name:name,
    cat:document.getElementById('f_cat').value,
    unit:document.getElementById('f_unit').value,
    buy: elBuy ? (parseFloat(elBuy.value)||0) : (prev?(Number(prev.buy)||0):0),
    sell:parseFloat(document.getElementById('f_sell').value)||0,
    stock:parseInt(document.getElementById('f_stock').value)||0,
    min:parseInt(document.getElementById('f_min').value)||0,
    feat: elFeat ? elFeat.classList.contains('on') : (prev?!!prev.feat:false),
    photo:currentItemPhoto(),
    rentable:rentOn,
    rentRate: rentOn ? (elRR?(parseFloat(elRR.value)||0):(prev?(Number(prev.rentRate)||0):0)) : 0
  };
  if(id){ var it=byId(id); var oldSell=Number(it.sell)||0; Object.assign(it,obj); if(oldSell!==obj.sell) logAct('Price changed: '+obj.name+' '+inr(oldSell)+' → '+inr(obj.sell)); toast('Item updated'); }
  else { obj.id='i'+Date.now(); DB.items.push(obj); logAct('New item added: '+obj.name); toast('Item added'); }
  saveDB(); closeSheet(); render();
}
function deleteItem(id){
  if(!confirm('Delete this item? This cannot be undone.')) return;
  DB.items=DB.items.filter(function(i){return i.id!==id;});
  saveDB(); closeSheet(); toast('Item deleted'); render();
}
function adjustStock(id){
  var it=byId(id);
  var h='<h2>Adjust Stock<button class="x" onclick="openItemForm(\''+id+'\')">×</button></h2>';
  h+='<div class="card card-pad" style="text-align:center"><div class="muted">'+esc(it.name)+'</div>'+
     '<div style="font-size:30px;font-weight:800" class="tabular" id="adjval">'+it.stock+'</div>'+
     '<div class="muted">'+esc(it.unit)+' in stock</div></div>';
  h+='<label class="fld" style="margin-top:12px"><span class="lab">Add stock received (+)</span>'+
     '<input class="inp" id="adj_in" inputmode="numeric" placeholder="Qty received"></label>';
  h+='<label class="fld"><span class="lab">Or set exact stock count</span>'+
     '<input class="inp" id="adj_set" inputmode="numeric" placeholder="Exact count"></label>';
  h+='<button class="btn primary" onclick="applyStock(\''+id+'\')">Update Stock</button>';
  openSheet(h);
}
function applyStock(id){
  var it=byId(id);
  var was=it.stock||0;
  var add=document.getElementById('adj_in').value;
  var setv=document.getElementById('adj_set').value;
  if(setv!=='') it.stock=parseInt(setv)||0;
  else if(add!=='') it.stock=(it.stock||0)+(parseInt(add)||0);
  if(it.stock!==was) logAct('Stock updated: '+it.name+' '+was+' → '+it.stock+' '+it.unit);
  saveDB(); closeSheet(); toast('Stock updated'); render();
}

function lineAmt(l){ return (Number(l.rate)||0)*(Number(l.qty)||0)*(l.kind==='rent'?(Number(l.days)||1):1); }
function billTotals(){
  var sub=bill.lines.reduce(function(a,l){return a+lineAmt(l);},0);
  var disc=Number(bill.discount)||0;
  var del=bill.delivery?(Number(bill.delCharge)||0):0;
  var grand=Math.max(0,sub-disc+del);
  var paid=bill.type==='invoice'?(Number(bill.paid)||0):0;
  var bal=Math.max(0,grand-paid);
  return {sub:sub,disc:disc,del:del,grand:grand,paid:paid,bal:bal};
}

/* ---- aggregate customers from invoices ---- */
function customerList(){
  var map={};
  DB.invoices.forEach(function(x){
    var key=(x.cust.name||'').trim().toLowerCase()+'|'+cleanPhone(x.cust.phone);
    if(!key.trim()) return;
    if(!map[key]) map[key]={name:x.cust.name,phone:x.cust.phone,bal:0,count:0};
    if(x.type==='invoice'){ map[key].bal+=x.balance||0; map[key].count++; }
  });
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.bal-a.bal;});
}

/* ---- finalize ---- */
function finalizeBill(action){
  if(!bill.lines.length){ toast('Add at least one item'); return; }
  // already saved this bill? just re-share, don't create a second invoice/rental
  if(bill.savedId){
    var prev=DB.invoices.find(function(x){return x.id===bill.savedId;});
    if(prev){
      if(action==='wa') shareBillWA(prev);
      else if(action==='pdf') exportBillPDF(prev);
      else { go('khata'); openBillView(prev.id); }
      return;
    }
  }
  var t=billTotals();
  var isInv=bill.type==='invoice';
  var no = isInv ? ('AVT-INV-'+String(DB.invSeq).padStart(4,'0')) : ('AVT-QT-'+String(DB.quoteSeq).padStart(4,'0'));
  var rec={
    id:'b'+Date.now(), no:no, type:bill.type, date:bill.date, lang:bill.lang||'en',
    cust:{name:bill.cust.name.trim()||'Cash', phone:bill.cust.phone.trim(), addr:(bill.cust.addr||'').trim()},
    lines:bill.lines.map(function(l){return {id:l.id,name:l.name,unit:l.unit,rate:l.rate,qty:l.qty,kind:l.kind||'sale',days:(l.kind==='rent'?(Number(l.days)||1):0),amount:lineAmt(l)};}),
    sub:t.sub, discount:t.disc, delivery:bill.delivery, delCharge:t.del, delAddr:bill.delAddr,
    total:t.grand, paid:t.paid, balance:t.bal, delivered:false,
    notes:(bill.notes||'').trim(),
    quoteRef:bill.quoteRef||'',
    staff:staffCode(),
    terms:termsFor(bill.lang||'en')
  };
  // commit
  if(isInv){
    DB.invSeq++;
    // decrement stock for known items
    rec.lines.forEach(function(l){ if(l.id && l.kind!=='rent'){ var it=byId(l.id); if(it){ it.stock=Math.max(0,(it.stock||0)-l.qty); } } });
    if(bill.fromQuoteId){ var srcQ=DB.invoices.find(function(x){return x.id===bill.fromQuoteId;}); if(srcQ){ srcQ.convertedTo=rec.no; } }
  }else{ DB.quoteSeq++; }
  DB.invoices.unshift(rec);
  var rentRec=rentalFromInvoice(rec);
  if(rentRec){ rec.rentalId=rentRec.id; DB.rentals.unshift(rentRec); }
  bill.savedId=rec.id;
  logAct((rec.type==='invoice'?'New invoice ':'New quote ')+rec.no+' · '+inr(rec.total)+(rec.cust.name&&rec.cust.name!=='Cash'?' · '+rec.cust.name:''));
  saveDB();

  var lowNow=lowStockItems();
  if(isInv && lowNow.length){ toast(no+' saved · '+lowNow.length+' item(s) now low on stock'); }
  else toast(no+' saved');

  if(action==='wa') shareBillWA(rec);
  else if(action==='pdf') exportBillPDF(rec);
  else { go('khata'); openBillView(rec.id); }
}

/* ---- WhatsApp text document ---- */
function billText(rec){
  var lg=rec.lang||'en';
  var L=[]; var line='— — — — — — — — — — —';
  L.push('*'+DB.shop.name.toUpperCase()+'*');
  L.push(DB.shop.addr);
  if(DB.shop.gst) L.push(DB.shop.gst);
  L.push('📞 '+DB.shop.phone);
  L.push(line);
  L.push(rec.type==='invoice'?('*'+L_(lg,'invoice')+'*  '+rec.no):('*'+L_(lg,'quote')+'*  '+rec.no));
  if(rec.quoteRef) L.push('('+L_(lg,'quote')+': '+rec.quoteRef+')');
  if(rec.staff) L.push('👤 '+rec.staff);
  L.push(L_(lg,'date')+': '+fmtDate(rec.date)+'   '+L_(lg,'time')+': '+fmtTime(rec.date));
  if(rec.cust.name) L.push(L_(lg,'to')+': '+rec.cust.name);
  if(rec.cust.addr) L.push(L_(lg,'addr')+': '+rec.cust.addr);
  if(rec.cust.phone) L.push('📞 '+rec.cust.phone);
  L.push(line);
  L.push('*'+L_(lg,'sno')+'  '+L_(lg,'item')+'  ('+L_(lg,'qty')+' × '+L_(lg,'rate')+')*');
  rec.lines.forEach(function(l,i){
    if(l.kind==='rent'){
      L.push((i+1)+'. '+l.name+' 🔁');
      L.push('    '+L_(lg,'qty')+': '+l.qty+' '+l.unit+' × '+inr(l.rate)+L_(lg,'perDay')+' × '+(l.days||1)+' '+L_(lg,'days')+' = *'+inr(l.amount)+'*');
    }else{
      L.push((i+1)+'. '+l.name);
      L.push('    '+L_(lg,'qty')+': '+l.qty+' '+l.unit+' × '+inr(l.rate)+' = *'+inr(l.amount)+'*');
    }
  });
  L.push(line);
  L.push(L_(lg,'subtotal')+': '+inr(rec.sub));
  if(rec.discount) L.push(L_(lg,'discount')+': −'+inr(rec.discount));
  if(rec.delCharge) L.push(L_(lg,'delivery')+': '+inr(rec.delCharge));
  L.push('*'+L_(lg,'total')+': '+inr(rec.total)+'*');
  if(rec.type==='invoice'){
    L.push(L_(lg,'paid')+': '+inr(rec.paid));
    L.push('*'+L_(lg,'balance')+': '+inr(rec.balance)+'*');
  }
  if(rec.delivery && rec.delAddr){ L.push(line); L.push('🚚 '+L_(lg,'deliverTo')+': '+rec.delAddr); }
  if(rec.notes){ L.push(line); L.push('📝 '+L_(lg,'notes')+': '+rec.notes); }
  L.push(line);
  L.push('_'+L_(lg,'terms')+'_');
  rec.terms.forEach(function(t){ L.push('• '+t); });
  L.push(line);
  L.push(L_(lg,'thanks')+' — '+DB.shop.name);
  return L.join('\n');
}
function L_(lg,key){ return L(lg,key); }
function shareBillWA(rec){ openWA(rec.cust.phone, billText(rec)); }

/* ---- PDF via jsPDF (lazy) ---- */
var _jspdf=null;
function loadScriptChain(srcs,check){
  return new Promise(function(res,rej){
    var got=check(); if(got) return res(got);
    var i=0;
    (function next(){

function loadHtml2Canvas(){

/* Render a full HTML document (non-Latin scripts included) to a shareable PDF via an offscreen iframe */
/* Build a page's full HTML: head block (shop+invoice+bill-to+table-head) + a slice
   of rows + (footer block only if this page is the last one). */
function billPageHTML(rec,lg,rtl,rowsHTMLSlice,showFooter){
  return billHeadBlockHTML(rec,lg,rtl)+rowsHTMLSlice+
    (showFooter ? billFootBlockHTML(rec,lg,rtl,false) : '</tbody></table></div></body></html>');
}
/* Pure helper: split `totalRows` rows into pages of at most `perPage` rows each,
   attaching the footer to the final page. Exposed standalone so it can be unit
   tested without any DOM/canvas involved. */
function paginateRows(totalRows,perPage){
  perPage=Math.max(1,perPage|0);
  var pages=[]; var i=0;
  if(totalRows<=0){ pages.push({start:0,end:0,hasFooter:true}); return pages; }
  while(i<totalRows){
    var end=Math.min(totalRows,i+perPage);
    pages.push({start:i,end:end,hasFooter:end>=totalRows});
    i=end;
  }
  return pages;
}
/* Hindi/Urdu (and any non-English) invoice/quote PDF, built page-by-page so the
   shop header, invoice details and the column headings repeat on every page.
   Each page is rendered as its own snapshot; if a page overflows the A4 height
   it is retried with fewer rows (self-correcting, no hardcoded row-height guess). */
function buildMultiPageBillPDF(rec,lg,rtl,filename){
  toast('Building PDF…');
  var allRowsHTML=rec.lines.map(function(l,i){return billRowHTML(l,i,lg);});
  var n=allRowsHTML.length;
  function renderFragment(html){
    var ifr=document.createElement('iframe');
    ifr.setAttribute('aria-hidden','true');
    ifr.style.cssText='position:fixed;left:-10000px;top:0;width:800px;height:1200px;border:0;background:#fff;';
    document.body.appendChild(ifr);
    var idoc=ifr.contentDocument||ifr.contentWindow.document;
    idoc.open(); idoc.write(html); idoc.close();
    return new Promise(function(res){ setTimeout(res,300); })
      .then(function(){ return loadHtml2Canvas(); })
      .then(function(h2c){ return h2c(idoc.body,{scale:2,backgroundColor:'#ffffff',windowWidth:800,useCORS:true}); })
      .then(function(canvas){ if(ifr.parentNode) document.body.removeChild(ifr); return canvas; })
      .catch(function(e){ if(ifr.parentNode) document.body.removeChild(ifr); throw e; });
  }
  return loadJsPDF().then(function(jsPDF){
    var pdf=new jsPDF({unit:'pt',format:'a4'});
    var pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
    var pageNum=0, idx=0;
    function renderOnePage(startIdx,tryCount,attemptsLeft){
      var endIdx=Math.min(n,startIdx+tryCount);
      var isLast=endIdx>=n;
      var slice=allRowsHTML.slice(startIdx,endIdx).join('');
      var html=billPageHTML(rec,lg,rtl,slice,isLast);
      return renderFragment(html).then(function(canvas){
        var k=pw/canvas.width, ih=canvas.height*k;
        if(ih>ph && tryCount>1 && attemptsLeft>0){
          return renderOnePage(startIdx, Math.max(1,Math.floor(tryCount*0.72)), attemptsLeft-1);
        }
        return {canvas:canvas, ih:ih, endIdx:endIdx, isLast:isLast};
      });
    }
    function step(){
      var remaining=n-idx;
      var tryCount=Math.max(1, Math.min(remaining||1, 16)); // initial guess; shrinks automatically if it overflows
      return renderOnePage(idx,tryCount,6).then(function(res){
        if(pageNum>0) pdf.addPage();
        var img=res.canvas.toDataURL('image/jpeg',0.92);
        pdf.addImage(img,'JPEG',0,0,pw,res.ih);
        pageNum++;
        idx = n===0 ? n : res.endIdx;
        if(idx<n) return step();
      });
    }
    var start = n===0
      ? renderFragment(billPageHTML(rec,lg,rtl,'',true)).then(function(canvas){
          var k=pw/canvas.width; pdf.addImage(canvas.toDataURL('image/jpeg',0.92),'JPEG',0,0,pw,canvas.height*k); pageNum=1;
        })
      : step();
    return start.then(function(){
      var total=pdf.internal.getNumberOfPages();
      if(total>1){
        for(var p=1;p<=total;p++){ pdf.setPage(p); pdf.setFont('helvetica','normal'); pdf.setFontSize(8); pdf.setTextColor(150,150,150); pdf.text('Page '+p+' of '+total, pw/2, ph-20, {align:'center'}); }
      }
      var blob=pdf.output('blob');
      sharePDF(blob,filename,rec);
    });
  }).catch(function(){ toast('PDF needs internet once. Opening print view…'); printBill(rec); });
}
function pdfFromDoc(fullHTML, filename, meta){
  toast('Building PDF…');
  var ifr=document.createElement('iframe');
  ifr.setAttribute('aria-hidden','true');
  ifr.style.cssText='position:fixed;left:-10000px;top:0;width:800px;height:1200px;border:0;background:#fff;';
  document.body.appendChild(ifr);
  var idoc=ifr.contentDocument||ifr.contentWindow.document;
  idoc.open(); idoc.write(fullHTML); idoc.close();
  return new Promise(function(r){ setTimeout(r,400); })
    .then(loadHtml2Canvas)
    .then(function(h2c){ return h2c(idoc.body,{scale:2,backgroundColor:'#ffffff',windowWidth:800,useCORS:true}); })
    .then(function(canvas){
      return loadJsPDF().then(function(jsPDF){
        var img=canvas.toDataURL('image/jpeg',0.92);
        var pdf=new jsPDF({unit:'pt',format:'a4'});
        var pw=pdf.internal.pageSize.getWidth(), ph=pdf.internal.pageSize.getHeight();
        var iw=pw, ih=canvas.height*(pw/canvas.width);
        if(ih<=ph){ pdf.addImage(img,'JPEG',0,0,iw,ih); }
        else { var pos=0, rem=ih; pdf.addImage(img,'JPEG',0,pos,iw,ih); rem-=ph;
          while(rem>0){ pdf.addPage(); pos-=ph; pdf.addImage(img,'JPEG',0,pos,iw,ih); rem-=ph; } }
        var blob=pdf.output('blob');
        if(ifr.parentNode) document.body.removeChild(ifr);
        sharePDF(blob,filename,meta);
      });
    })
    .catch(function(){ if(ifr.parentNode) document.body.removeChild(ifr); toast('PDF needs internet once. Opening print view…'); var w=window.open('','_blank'); if(w){ w.document.write(fullHTML.replace('</body>','<button onclick="window.print()" style="margin:18px;padding:12px 18px;background:#D4791B;color:#fff;border:none;border-radius:8px;font-weight:700">🖨 Save as PDF</button></body>')); w.document.close(); } });
}

function applyPayment(id){
  var x=DB.invoices.find(function(i){return i.id===id;});
  var amt=parseFloat(document.getElementById('pay_amt').value)||0;
  if(amt<=0){toast('Enter amount');return;}
  x.paid=Math.min(x.total,(x.paid||0)+amt); x.balance=Math.max(0,x.total-x.paid);
  logAct('Payment '+inr(amt)+' on '+x.no+(x.cust.name&&x.cust.name!=='Cash'?' · '+x.cust.name:'')+(x.balance>0?' (bal '+inr(x.balance)+')':' (cleared)'));
  saveDB(); closeSheet(); toast('Payment recorded'); render();
  if(x.cust.phone && confirm('Send payment confirmation on WhatsApp?')){
    openWA(x.cust.phone,'Received '+inr(amt)+' against '+x.no+'. '+(x.balance>0?'Balance now '+inr(x.balance)+'.':'Account cleared. Thank you!')+'\n— '+DB.shop.name);
  }
}
function deleteBill(id){

}

  var modes=[['daily','Daily from a date'],['once','Once on a date'],['off','Turn off']];

  h+='<p class="muted" style="font-size:13px;margin-bottom:10px">The app will remind you to send this when you open it — daily from the date, or once on the date.</p>';
  h+='<div class="lab" style="margin-bottom:6px">When</div>';
  modes.forEach(function(md){
    h+='<button class="btn '+(sched.mode===md[0]?'primary':'ghost')+' sm" style="width:100%;margin-bottom:8px" onclick="sched.mode=\''+md[0]+'\';renderSchedule()">'+md[1]+'</button>';
  });
  if(sched.mode!=='off'){
    h+='<label class="fld"><span class="lab">'+(sched.mode==='daily'?'Start reminding from':'Reminder date')+'</span><input class="inp" type="date" value="'+new Date(sched.from).toISOString().slice(0,10)+'" onchange="sched.from=this.value?new Date(this.value).toISOString():nowISO()"></label>';
  }

  openSheet(h);
}
function saveSchedule(){
  var rec=(sched.kind==='rental')?DB.rentals.find(function(x){return x.id===sched.id;}):DB.invoices.find(function(x){return x.id===sched.id;});
  if(!rec){ closeSheet(); return; }
  if(sched.mode==='off'){ rec.remMode=''; rec.remFrom=''; toast('Reminder turned off'); }
  else { rec.remMode=sched.mode; rec.remFrom=sched.from; rec.remLast=''; toast('Reminder scheduled'); }

}

function applyRentalPayment(id){
  var r=DB.rentals.find(function(x){return x.id===id;}); if(!r) return;
  var amt=parseFloat(document.getElementById('rpay_amt').value)||0;
  if(amt<=0){toast('Enter amount');return;}
  r.paid=Math.min(rentalNet(r),(Number(r.paid)||0)+amt); saveDB(); closeSheet(); toast('Payment recorded'); render();
  var bal=rentalBalance(r);
  if(r.cust.phone && confirm('Send payment confirmation on WhatsApp?')){
    openWA(r.cust.phone,'Received '+inr(amt)+' against '+(r.no||'rental')+'. '+(bal>0?'Balance now '+inr(bal)+'.':'Account cleared. Thank you!')+'\n— '+DB.shop.name);
  }
}

function shareRateList(scope,cat){
  var items=DB.items.slice();
  var title='RATE LIST';
  if(scope==='featured'){ items=items.filter(function(i){return i.feat||FEATURED_CATS.indexOf(i.cat)>=0;}); title='SPECIALITY RATE LIST'; }
  if(scope==='cat'){ items=items.filter(function(i){return i.cat===cat;}); title=cat.toUpperCase()+' RATE LIST'; }
  if(!items.length){toast('No items to share');return;}
  var groups={};
  items.forEach(function(i){ (groups[i.cat]=groups[i.cat]||[]).push(i); });
  var L=['*'+DB.shop.name.toUpperCase()+'*',DB.shop.addr,'📞 '+DB.shop.phone,'','*'+title+'*','('+todayStr()+')',''];
  Object.keys(groups).sort().forEach(function(c){
    L.push('*'+c+'*');
    groups[c].sort(function(a,b){return a.name.localeCompare(b.name);}).forEach(function(i){
      L.push('• '+i.name+' — '+inr(i.sell)+'/'+i.unit);
    });
    L.push('');
  });
  L.push('_Rates subject to change. Items not returnable after purchase._');
  L.push('— '+DB.shop.name);
  openWA('', L.join('\n'));
}

function importData(input){
  var f=input.files[0]; if(!f) return;
  var r=new FileReader();
  r.onload=function(){
    try{
      var d=JSON.parse(r.result);
      if(!d.items||!d.invoices) throw 0;
      if(!confirm('Restore this backup? It will replace current data.')) return;
      DB=d;
      for(var k in DEFAULTS){ if(!(k in DB)) DB[k]=JSON.parse(JSON.stringify(DEFAULTS[k])); }
      if(!DB.settings) DB.settings=JSON.parse(JSON.stringify(DEFAULTS.settings));
      saveDB(); toast('Backup restored'); go('home');
    }catch(e){ toast('Invalid backup file'); }
  };
  r.readAsText(f); input.value='';
}

function startOf(kind){
  var d=new Date(); d.setHours(0,0,0,0);
  if(kind==='day') return d.getTime();
  if(kind==='week'){ var wd=(d.getDay()+6)%7; d.setDate(d.getDate()-wd); return d.getTime(); } // Monday start
  if(kind==='month'){ d.setDate(1); return d.getTime(); }
  if(kind==='year'){ d.setMonth(0,1); return d.getTime(); }
  return 0;
}
function salesBetween(from,to){
  return DB.invoices.filter(function(x){ if(x.type!=='invoice') return false; var t=new Date(x.date).getTime(); return t>=from && (to==null||t<to); });
}
function expBetween(from,to){
  return (DB.expenses||[]).filter(function(e){ var t=new Date(e.date).getTime(); return t>=from && (to==null||t<to); });
}
function rentalsBetween(from,to){
  return (DB.rentals||[]).filter(function(r){ var t=new Date(r.dateOut).getTime(); return t>=from && (to==null||t<to); });
}
/* number of chargeable days between two ISO dates (min 1) */
function rentDays(out,end){
  if(!out) return 1;
  var s=new Date(out); s.setHours(0,0,0,0);
  var e=end?new Date(end):new Date(); e.setHours(0,0,0,0);
  var d=Math.round((e.getTime()-s.getTime())/86400000);
  return Math.max(1,d);
}
function rentPerDay(items){ return (items||[]).reduce(function(a,it){return a+(Number(it.rate)||0)*(Number(it.qty)||1);},0); }
/* effective days for a rental: actual if returned, else planned (due) or elapsed-so-far */
function rentalDaysFor(r){
  if(r.billed) return r.days||1;
  if(r.returned && r.returnedDate) return r.days||rentDays(r.dateOut,r.returnedDate);
  if(r.dueDate) return rentDays(r.dateOut,r.dueDate);
  return rentDays(r.dateOut,null);
}
/* days for a single item — per-line days (bill rentals) or the rental-level days */
function itemDays(r,it){ return (it&&it.days)?it.days:rentalDaysFor(r); }
function rentalGross(r){ return (r.items||[]).reduce(function(a,it){return a+(Number(it.rate)||0)*(Number(it.qty)||1)*itemDays(r,it);},0); }
function rentalNet(r){
  if(r.billed) return Number(r.rentAmount)||0;             // invoiced on a bill — fixed
  if(r.returned) return Number(r.rentAmount)||0;           // finalized at return
  var g=rentalGross(r)-(Number(r.discount)||0);            // live estimate
  if(g<=0 && (Number(r.rentAmount)||0)>0) return Number(r.rentAmount)||0; // legacy/manual fallback
  return Math.max(0, g);
}
function rentSum(arr){ return arr.reduce(function(a,r){return a+rentalNet(r);},0); }
/* outstanding rent for a standalone rental (billed rentals are tracked on their invoice) */
function rentalBalance(r){ if(r.billed) return 0; return Math.max(0, rentalNet(r)-(Number(r.paid)||0)); }
/* present a rental as a bill-like object so it can reuse the reminder text */
function rentalAsBill(r){ return { no:r.no||'Rental', total:rentalNet(r), paid:(Number(r.paid)||0), balance:rentalBalance(r), date:r.dateOut, cust:r.cust }; }
/* unified list of parties who owe money (invoices + standalone rentals) */
function debtors(){
  var arr=[];
  (DB.invoices||[]).forEach(function(x){ if(x.type==='invoice'&&x.balance>0) arr.push({kind:'invoice',id:x.id,rec:x,name:x.cust.name,phone:x.cust.phone,no:x.no,bal:x.balance,date:x.date}); });
  (DB.rentals||[]).forEach(function(r){ if(!r.billed){ var b=rentalBalance(r); if(b>0) arr.push({kind:'rental',id:r.id,rec:r,name:r.cust.name,phone:r.cust.phone,no:r.no||'Rental',bal:b,date:r.dateOut}); } });
  return arr;
}
function totalOutstanding(){ return debtors().reduce(function(a,d){return a+d.bal;},0); }
/* ---- reminder scheduling (local; surfaced when app is opened) ---- */
function dayKey(d){ d=d?new Date(d):new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function remDueToday(rec){
  if(!rec||!rec.remMode) return false;
  var today=dayKey();
  if(rec.remLast===today) return false;
  var from=rec.remFrom?dayKey(rec.remFrom):today;
  if(rec.remMode==='once') return today===from;
  if(rec.remMode==='daily') return today>=from;
  return false;
}
function scheduledParties(){ return debtors().filter(function(d){return d.rec.remMode;}); }
function remindersDueToday(){ return debtors().filter(function(d){return remDueToday(d.rec);}); }
/* build a trackable rental record from an invoice's rent lines (null if none) */
function rentalFromInvoice(rec){
  var rl=(rec.lines||[]).filter(function(l){return l.kind==='rent';});
  if(!rl.length) return null;
  var maxDays=rl.reduce(function(a,l){return Math.max(a,Number(l.days)||1);},1);
  var due=new Date(rec.date); due.setDate(due.getDate()+maxDays);
  return {
    id:'rb'+(rec.id||Date.now()), no:rec.no, billed:true, billNo:rec.no,
    cust:{name:rec.cust.name||'', phone:rec.cust.phone||'', addr:rec.cust.addr||''},
    items:rl.map(function(l){return {name:l.name,qty:l.qty,unit:l.unit,rate:l.rate,days:Number(l.days)||1};}),
    deposit:0, dateOut:rec.date, dueDate:due.toISOString(), notes:'',
    discount:0, days:maxDays,
    rentAmount:rl.reduce(function(a,l){return a+(Number(l.amount)||0);},0),
    returned:false, returnedDate:''
  };
}
/* one-time: create tracking rentals for older bills that had rent lines */
function migrateBillRentals(){
  var changed=false;
  (DB.invoices||[]).forEach(function(rec){
    if(rec.type!=='invoice' || rec.rentalId) return;
    var rr=rentalFromInvoice(rec);
    if(rr){ rec.rentalId=rr.id; DB.rentals.unshift(rr); changed=true; }
  });
  if(changed) saveDB();
}
function sum(arr,f){ return arr.reduce(function(a,b){return a+(f?f(b):b);},0); }

/* ============================================================
   REPORTS — day / week / month / year sales
============================================================ */
var repTab='total';
function viewReports(){
  var h=screenHeader('Reports','Sales · Rental · Expenses · Purchase · Profit');
  var tabs=[['total','Total Sales'],['items','Item Sales'],['rental','Rental'],['expenses','Expenses'],['purchases','Purchase'],['profit','Profit']];
  h+='<div class="btn-row" style="flex-wrap:wrap;gap:6px;margin-bottom:12px">';
  tabs.forEach(function(tb){
    h+='<button class="btn '+(repTab===tb[0]?(tb[0]==='total'?'primary':'steel'):'ghost')+' sm" style="flex:1;min-width:74px" onclick="repTab=\''+tb[0]+'\';render()">'+tb[1]+'</button>';
  });
  h+='</div>';
  if(repTab==='items') return h+repItems();
  if(repTab==='rental') return h+repRental();
  if(repTab==='expenses') return h+repExpenses();
  if(repTab==='purchases') return h+repPurchases();
  if(repTab==='profit') return h+repProfit();
  return h+repTotal();
}
/* rent amount embedded inside a normal bill (rent-kind lines) */
function invRentPart(x){ return (x.lines||[]).reduce(function(a,l){return a+(l.kind==='rent'?(Number(l.amount)||0):0);},0); }
/* period helper. items = bill totals minus their rent lines; rent = rental records (incl. bill-created + standalone) */
function periodFigures(from,to){
  var s=salesBetween(from,to); var rr=rentalsBetween(from,to);
  var billTotal=sum(s,function(x){return x.total;});
  var billRent=sum(s,function(x){return invRentPart(x);});
  return { items:Math.max(0,billTotal-billRent), rent:rentSum(rr),
           exp:sum(expBetween(from,to),function(e){return e.amount;}),
           bills:s.length, rentals:rr.length };
}
function itemsVal(f,t){ return periodFigures(f,t).items; }
function rentVal(f,t){ return periodFigures(f,t).rent; }
function totalVal(f,t){ var pf=periodFigures(f,t); return pf.items+pf.rent; }
/* all-time split */
function allItemSales(){ var s=DB.invoices.filter(function(x){return x.type==='invoice';}); return sum(s,function(x){return x.total;})-sum(s,function(x){return invRentPart(x);}); }
function allRentSales(){ return rentSum(DB.rentals||[]); }
var REP_PERIODS=[['day','Today'],['week','This Week'],['month','This Month'],['year','This Year']];

/* ---- report period selector (All time / Year / Month, with navigator) ---- */
var repSel={mode:'all',y:(new Date()).getFullYear(),m:(new Date()).getMonth()};
function repRange(){
  if(repSel.mode==='year') return [new Date(repSel.y,0,1).getTime(), new Date(repSel.y+1,0,1).getTime()];
  if(repSel.mode==='month') return [new Date(repSel.y,repSel.m,1).getTime(), new Date(repSel.y,repSel.m+1,1).getTime()];
  return [0,null];
}
function repLabel(){
  if(repSel.mode==='year') return String(repSel.y);
  if(repSel.mode==='month') return new Date(repSel.y,repSel.m,1).toLocaleDateString('en-IN',{month:'short',year:'numeric'});
  return 'all time';
}
function repSetMode(m){ repSel.mode=m; render(); }
function repNav(d){
  if(repSel.mode==='year') repSel.y+=d;
  else if(repSel.mode==='month'){ var x=new Date(repSel.y,repSel.m+d,1); repSel.y=x.getFullYear(); repSel.m=x.getMonth(); }
  render();
}
function repSelectorHTML(){
  var h='<div class="btn-row" style="margin-bottom:8px">'+
    [['all','All time'],['year','Year'],['month','Month']].map(function(md){return '<button class="btn '+(repSel.mode===md[0]?'steel':'ghost')+' sm" style="flex:1" onclick="repSetMode(\''+md[0]+'\')">'+md[1]+'</button>';}).join('')+'</div>';
  if(repSel.mode!=='all'){
    h+='<div class="between" style="margin-bottom:10px;background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:5px 8px">'+
       '<button class="btn ghost tiny" onclick="repNav(-1)">◀</button>'+
       '<div style="font-weight:800">'+repLabel()+'</div>'+
       '<button class="btn ghost tiny" onclick="repNav(1)">▶</button></div>';
  }
  return h;
}

/* ---- cost of goods sold + profit ---- */
function lineCost(l){ if(l.kind==='rent') return 0; var it=l.id?byId(l.id):null; var buy=it?(Number(it.buy)||0):0; return buy*(Number(l.qty)||0); }
function invCOGS(x){ return (x.lines||[]).reduce(function(a,l){return a+lineCost(l);},0); }
function cogsBetween(from,to){ return salesBetween(from,to).reduce(function(a,x){return a+invCOGS(x);},0); }
/* gross profit = (item sales + rental) − cost of goods; net = gross − expenses */
function grossProfit(from,to){ var pf=periodFigures(from,to); return (pf.items+pf.rent)-cogsBetween(from,to); }
function netProfit(from,to){ return grossProfit(from,to)-sum(expBetween(from,to),function(e){return e.amount;}); }
function grossVal(f,t){ return grossProfit(f,t); }
function netVal(f,t){ return netProfit(f,t); }
function expVal(f,t){ return sum(expBetween(f,t),function(e){return e.amount;}); }
function allCOGS(){ return DB.invoices.filter(function(x){return x.type==='invoice';}).reduce(function(a,x){return a+invCOGS(x);},0); }
function allExpenses(){ return sum((DB.expenses||[]),function(e){return e.amount;}); }

/* ---- item-wise sales (sale lines aggregated by item) ---- */
function itemWiseSales(from,to){
  var map={};
  salesBetween(from,to).forEach(function(x){
    (x.lines||[]).forEach(function(l){
      if(l.kind==='rent') return;
      var key=(l.name||'').toLowerCase();
      if(!map[key]) map[key]={name:l.name,unit:l.unit,qty:0,amt:0,cost:0};
      map[key].qty+=Number(l.qty)||0; map[key].amt+=Number(l.amount)||0; map[key].cost+=lineCost(l);
    });
  });
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.amt-a.amt;});
}
/* ---- item-wise rental (rental item lines aggregated) ---- */
function rentalItemWise(from,to){
  var map={};
  (DB.rentals||[]).forEach(function(r){
    if(from!=null){ var t=new Date(r.dateOut).getTime(); if(!(t>=from && (to==null||t<to))) return; }
    (r.items||[]).forEach(function(it){
      var d=itemDays(r,it);
      var amt=(Number(it.rate)||0)*(Number(it.qty)||1)*d;
      var key=(it.name||'').toLowerCase();
      if(!map[key]) map[key]={name:it.name,unit:it.unit,qty:0,amt:0,times:0,days:0};
      map[key].qty+=Number(it.qty)||0; map[key].amt+=amt; map[key].times+=1; map[key].days+=d;
    });
  });
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.amt-a.amt;});
}
/* ---- purchases (period + item-wise) ---- */
function purchasesBetween(from,to){ return (DB.purchases||[]).filter(function(p){ var t=new Date(p.date).getTime(); return t>=from && (to==null||t<to); }); }
function purVal(f,t){ return sum(purchasesBetween(f,t),function(p){return Number(p.amount)||0;}); }
function purchaseItemWise(from,to){
  var map={};
  purchasesBetween(from,to).forEach(function(p){
    (p.lines||[]).forEach(function(l){
      var key=(l.name||'').toLowerCase();
      if(!map[key]) map[key]={name:l.name,unit:l.unit,qty:0,amt:0};
      map[key].qty+=Number(l.qty)||0; map[key].amt+=Number(l.amount)||0;
    });
  });
  return Object.keys(map).map(function(k){return map[k];}).sort(function(a,b){return b.amt-a.amt;});
}
function allPurchases(){ return sum((DB.purchases||[]),function(p){return Number(p.amount)||0;}); }
function supplierPayable(){ return sum((DB.purchases||[]),function(p){return Number(p.balance)||0;}); }

/* ---- expenses grouped by category ---- */
function expByCat(from,to){
  var map={};
  expBetween(from,to).forEach(function(e){ var c=e.cat||'Misc'; if(!map[c])map[c]={amt:0,n:0}; map[c].amt+=(Number(e.amount)||0); map[c].n+=1; });
  return Object.keys(map).map(function(c){return {cat:c,amt:map[c].amt,n:map[c].n};}).sort(function(a,b){return b.amt-a.amt;});
}

  var mF=startOf('month');
  var pf=periodFigures(mF,null); var rev=pf.items+pf.rent;

/* shared bar-chart helpers */
function last7(valFn){
  var days=[];
  for(var i=6;i>=0;i--){ var d=new Date(); d.setHours(0,0,0,0); d.setDate(d.getDate()-i);
    var f=d.getTime(), t=f+86400000; days.push([d.toLocaleDateString('en-IN',{weekday:'short'}), valFn(f,t)]); }
  return days;
}
function last6(valFn){
  var mon=[]; var base=new Date(); base.setDate(1); base.setHours(0,0,0,0);
  for(var j=5;j>=0;j--){ var ms=new Date(base.getFullYear(),base.getMonth()-j,1).getTime();
    var me=new Date(base.getFullYear(),base.getMonth()-j+1,1).getTime();
    mon.push([new Date(ms).toLocaleDateString('en-IN',{month:'short'}), valFn(ms,me)]); }
  return mon;
}
function barBlock(title,pairs){
  var max=1; pairs.forEach(function(p){ if(p[1]>max)max=p[1]; });
  var h='<div class="section-eyebrow">'+title+' <span class="ln"></span></div><div class="card card-pad">';
  pairs.forEach(function(p){
    h+='<div class="bar-row"><div class="bl">'+p[0]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(p[1]/max*100)+'%"></div></div><div class="bv tabular">'+inr(p[1])+'</div></div>';
  });
  return h+'</div>';
}
